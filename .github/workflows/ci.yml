name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Backend linting with Ruff
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --dev
      - name: Ruff lint check
        run: uv run ruff check .
        continue-on-error: true  # Pre-existing warnings in broker modules
      - name: Ruff format check
        run: uv run ruff format --check .
        continue-on-error: true  # Pre-existing formatting in broker modules

  # Backend tests (CI-safe subset - no broker credentials needed)
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync
      - name: Run CI-safe tests
        run: |
          uv run pytest test/test_log_location.py test/test_navigation_update.py \
            test/test_python_editor.py test/test_rate_limits_simple.py \
            test/test_logout_csrf.py -v --timeout=60

  # Frontend linting
  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  # Frontend build (includes TypeScript check)
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v6
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # Frontend unit tests
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test:run
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: frontend/coverage/
          retention-days: 7

  # Frontend E2E tests (Chromium only for speed)
  frontend-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e -- --project=chromium
      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # Security scanning
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --dev
      - name: Bandit security scan
        run: uv run bandit -r . -x .venv,test,frontend,node_modules -ll -f txt
        continue-on-error: true
      - name: pip-audit vulnerability scan
        run: uv run pip-audit
        continue-on-error: true

  # Auto-commit built frontend dist (main branch only)
  commit-dist:
    runs-on: ubuntu-latest
    needs: [frontend-build, frontend-lint, frontend-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Commit and push dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f frontend/dist/
          git diff --staged --quiet || git commit -m "chore: auto-build frontend dist [skip ci]"
          git push

  # Docker build, scan, and push to Docker Hub (main branch only).
  #
  # Multi-arch (issue #1205): builds linux/amd64 and linux/arm64 natively on
  # per-arch GitHub runners (ubuntu-latest / ubuntu-24.04-arm). No QEMU
  # emulation — each matrix leg runs on its own native arch. This is
  # essential because the image now installs chromium for Kaleido/Plotly
  # chart rendering, and chromium's apt post-install scripts are painfully
  # slow under QEMU (15-25 min vs ~2 min native).
  #
  # On PRs: each leg builds with `load: true` and runs the Kaleido smoke
  # test against the locally-loaded image of its own arch. No push. This
  # gives us native arm64 smoke-test coverage that a single-arch CI could
  # never provide.
  #
  # On main push: each leg builds and pushes by digest (no tag assigned),
  # then the docker-manifest job downloads all per-arch digests and
  # assembles them into a single Docker Hub manifest list under the
  # canonical tags (:latest, :<sha>).
  docker-build:
    needs: [backend-lint, backend-test, frontend-build, security-scan]
    # Skip for fork PRs (secrets not available)
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Per-arch metadata — labels only. Final tags are assigned by the
      # docker-manifest merge job, not here.
      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/openalgo

      # PR path: build single-arch and load into the runner's local Docker
      # daemon for the smoke test. No push.
      - name: Build (PR load)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: openalgo-ci:${{ matrix.suffix }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.suffix }}

      # Main-push path: build per-arch and push by digest. The manifest
      # job downstream assembles the per-arch digests into the final
      # multi-arch tags.
      - name: Build (main push by digest)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: build-main
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ secrets.DOCKERHUB_USERNAME }}/openalgo,push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.suffix }}

      # Kaleido + Chromium smoke test, run natively on each matrix leg.
      # Renders a trivial Plotly figure to PNG inside the just-built image
      # to verify chromium + kaleido + plotly are wired up end to end. Now
      # runs on both amd64 and arm64, so arch-specific regressions (e.g.
      # missing arm64 Chromium libs, wheel compatibility issues) surface
      # in CI rather than in production.
      #
      # Does NOT catch the asyncio/eventlet nesting regression — that one
      # only manifests when called from inside a live PTB event loop, and
      # plain `python -c` has no running loop. See
      # docs/telegram-chart-rendering.md for the full write-up.
      - name: Kaleido + Chromium smoke test
        if: github.event_name == 'pull_request'
        run: |
          SUFFIX="${{ matrix.suffix }}"
          echo "[smoke] Testing openalgo-ci:$SUFFIX"
          docker run --rm --entrypoint /app/.venv/bin/python "openalgo-ci:$SUFFIX" -c '
          import plotly.graph_objects as go
          img = go.Figure(data=[go.Candlestick(
              x=[1, 2], open=[100, 102], high=[105, 106],
              low=[99, 101], close=[104, 103]
          )]).to_image(format="png", engine="kaleido")
          assert len(img) > 1000, f"unexpected PNG size: {len(img)}"
          print(f"Kaleido smoke test OK: {len(img)} bytes")
          '
          echo "[smoke] $SUFFIX OK"

      # Export the per-arch digest so the docker-manifest job can pick it
      # up and assemble the final manifest list.
      - name: Export digest
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build-main.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v6
        with:
          name: digests-${{ matrix.suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Assemble the per-arch digests into a single Docker Hub manifest list
  # (linux/amd64 + linux/arm64) under the canonical tags (:latest, :<sha>).
  # Runs only on main push; Trivy scan against the assembled image also
  # happens here.
  docker-manifest:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download digests
        uses: actions/download-artifact@v6
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/openalgo
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=

      - name: Create multi-arch manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ secrets.DOCKERHUB_USERNAME }}/openalgo@sha256:%s ' *)

      - name: Inspect assembled image
        run: |
          docker buildx imagetools inspect ${{ secrets.DOCKERHUB_USERNAME }}/openalgo:${{ steps.meta.outputs.version }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/openalgo:latest
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          format: 'table'
