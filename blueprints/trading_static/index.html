<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenAlgo — Chart Trading</title>
  <style>
    /* Design tokens extracted from the OpenAlgo app (shadcn theme, hue 280). */
    :root {
      --bg: oklch(16% .02 280);
      --panel: oklch(18% .02 280);          /* sidebar tone */
      --card: oklch(20% .025 280);
      --elev: oklch(24% .025 280);
      --muted: oklch(28% .025 280);
      --bd: oklch(35% .04 280);
      --bd-soft: oklch(28% .03 280);
      --tx: oklch(95% .02 280);
      --mut: oklch(70% .03 280);
      --faint: oklch(55% .03 280);
      --primary: oklch(70% .2 280);
      --analyze: oklch(62.7% .265 303.9);
      --destructive: oklch(65% .2 25);
      --buy: #26a69a; --sell: #ef5350; --amber: #e6b53c;
      --r: 8px; --h: 30px;
    }
    /* Live mode follows the app's zinc theme (openalgo-theme in localStorage);
       analyzer (sandbox) mode is locked to the violet tokens above, like the app. */
    :root[data-theme="live-dark"] {
      --bg: #09090b; --panel: #0c0c0e; --card: #18181b; --elev: #1f1f23;
      --muted: #27272a; --bd: #3f3f46; --bd-soft: #27272a;
      --tx: #fafafa; --mut: #a1a1aa; --faint: #71717a;
      --primary: #a78bfa;
    }
    :root[data-theme="live-light"] {
      --bg: #fafafa; --panel: #ffffff; --card: #ffffff; --elev: #f4f4f5;
      --muted: #f4f4f5; --bd: #e4e4e7; --bd-soft: #ececee;
      --tx: #09090b; --mut: #52525b; --faint: #a1a1aa;
      --primary: #7c3aed;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--bg); color: var(--tx);
      font: 14px/1.45 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }

    /* ── app nav (playground-parity) ────────────────────────────── */
    .nav {
      display: flex; align-items: center; gap: 8px; height: 48px; padding: 0 12px; flex: none;
      position: relative; z-index: 50; /* keep the profile flyout above the toolbars + chart */
      background: var(--panel);
      border-bottom: 1px solid var(--bd);
    }
    .nav .logo { display: inline-flex; align-items: center; gap: 9px; text-decoration: none; color: var(--tx); }
    .nav .logo img { width: 26px; height: 26px; border-radius: 6px; background: #fff; }
    .nav .logo b { font-weight: 600; font-size: 14px; }
    .nav .logo small { color: var(--faint); font-weight: 500; font-size: 12px; }
    .nav-links { margin-left: auto; display: inline-flex; align-items: center; gap: 2px; }
    .nav-links a, .nav-links button {
      display: inline-flex; align-items: center; gap: 6px; height: 28px;
      color: var(--tx); background: transparent; border: 0; cursor: pointer;
      text-decoration: none; font: 500 12px/1 system-ui, sans-serif;
      padding: 0 10px; border-radius: 8px; transition: background .12s;
    }
    .nav-links a:hover, .nav-links button:hover { background: var(--muted); }
    .nav-links svg { width: 15px; height: 15px; }
    #mode {
      display: inline-flex; align-items: center; height: 22px; margin: 0 4px;
      border-radius: 999px; padding: 2px 10px;
      font: 500 12px/1 system-ui, sans-serif; color: var(--bg); background: var(--tx);
    }
    #mode.analyze { background: #a855f7; color: #fff; }
    #mode.live { background: var(--tx); color: var(--bg); }
    .iconbtn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 8px; border: 0; cursor: pointer;
      background: transparent; color: var(--tx); transition: background .12s;
    }
    .iconbtn:hover { background: var(--muted); }
    .iconbtn svg { width: 16px; height: 16px; }
    .iconbtn[disabled] { opacity: .5; cursor: default; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%; flex: none; margin-left: 4px;
      background: var(--primary); color: oklch(98% 0 0); border: 0; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      font: 500 14px/1 system-ui, sans-serif; text-transform: uppercase;
    }
    /* profile flyout (matches the app's dropdown) */
    .pwrap { position: relative; }
    .pmenu {
      position: absolute; right: 0; top: calc(100% + 8px); z-index: 80; width: 224px;
      background: var(--card); border: 1px solid var(--bd); border-radius: 10px;
      box-shadow: 0 16px 40px rgb(0 0 0 / .45); padding: 5px;
      max-height: min(560px, calc(100vh - 70px)); overflow: auto;
    }
    .pmenu[hidden] { display: none; }
    .pmenu a, .pmenu button {
      display: flex; align-items: center; gap: 9px; width: 100%;
      color: var(--tx); text-decoration: none; background: transparent; border: 0;
      font: 400 13px/1 system-ui, sans-serif; padding: 8px 10px; border-radius: 7px;
      cursor: pointer; transition: background .12s;
    }
    .pmenu a:hover, .pmenu button:hover { background: var(--muted); }
    .pmenu svg { width: 15px; height: 15px; flex: none; opacity: .8; }
    .pmenu hr { border: 0; border-top: 1px solid var(--bd-soft); margin: 5px 6px; }
    .pmenu .danger { color: #ef4444; }

    /* ── toolbars ────────────────────────────────────────────────── */
    .topbar, .subbar {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 8px 12px; border-bottom: 1px solid var(--bd-soft); background: var(--panel);
    }
    .subbar { padding: 6px 12px; color: var(--mut); }
    .divider { width: 1px; height: 20px; background: var(--bd-soft); margin: 0 2px; }
    .group { display: inline-flex; align-items: center; gap: 6px; }

    .field {
      height: var(--h); background: color-mix(in oklab, var(--muted) 50%, transparent);
      color: var(--tx); border: 1px solid var(--bd); border-radius: 8px;
      padding: 0 9px; font: 500 13px/1 system-ui, sans-serif; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .field::placeholder { color: var(--faint); font-weight: 400; }
    .field:hover { border-color: var(--primary); }
    .field:focus { border-color: var(--primary); box-shadow: 0 0 0 3px color-mix(in oklab, var(--primary) 22%, transparent); }
    select.field { cursor: pointer; }
    .field--qty { width: 64px; text-align: center; font-weight: 600; }

    .btn {
      height: var(--h); display: inline-flex; align-items: center; gap: 6px; padding: 0 12px;
      background: color-mix(in oklab, var(--muted) 50%, transparent);
      color: var(--tx); border: 1px solid var(--bd); border-radius: 8px;
      cursor: pointer; font: 500 13px/1 system-ui, sans-serif; transition: all .15s;
    }
    .btn:hover { border-color: var(--primary); background: var(--muted); }
    .btn:active { transform: translateY(1px); }
    .btn svg { width: 16px; height: 16px; }

    /* symbol search */
    .search { position: relative; }
    .search input { width: 240px; font-weight: 600; letter-spacing: .3px; text-transform: uppercase; }
    .search-pop {
      position: absolute; top: calc(var(--h) + 6px); left: 0; z-index: 50; width: 440px; max-height: 380px;
      overflow: auto; background: var(--card); border: 1px solid var(--bd); border-radius: 10px;
      box-shadow: 0 18px 44px rgb(0 0 0 / .45); padding: 5px;
    }
    .search-pop[hidden] { display: none; }
    .s-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; }
    .s-row:hover, .s-row.sel { background: var(--muted); }
    .s-sym { font-weight: 600; min-width: 150px; font-size: 13px; }
    .s-name { color: var(--mut); flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-size: 12px; }
    .s-badge { font-size: 10px; font-weight: 600; letter-spacing: .5px; padding: 2px 7px; border-radius: 999px;
      background: var(--muted); border: 1px solid var(--bd-soft); color: var(--mut); }
    .s-lot { font-size: 11px; color: var(--faint); min-width: 54px; text-align: right; }

    .chip {
      display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; font-size: 12px;
      background: color-mix(in oklab, var(--muted) 55%, transparent);
      border: 1px solid var(--bd-soft); border-radius: 999px; color: var(--mut);
    }
    .chip b { color: var(--tx); font-weight: 600; }
    .chip--ltp { color: var(--amber); }
    .led {
      width: 9px; height: 9px; border-radius: 50%; flex: none; margin: 0 4px;
      background: var(--faint); transition: background .2s, box-shadow .2s;
    }
    .led.ok { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .led.warn { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
    .led.off { background: var(--destructive); }
    .lbl { display: inline-flex; align-items: center; gap: 6px; color: var(--faint); font-size: 11px;
      text-transform: uppercase; letter-spacing: .6px; }
    .spacer { flex: 1 1 auto; }
    #status { color: var(--mut); font-size: 13px; max-width: 46vw; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #lotinfo { color: var(--faint); font-size: 12px; }

    /* ── chart stage ────────────────────────────────────────────── */
    .stage { position: relative; flex: 1 1 auto; min-height: 0; }
    #chart { position: absolute; inset: 0; cursor: crosshair; }
    .legend {
      position: absolute; top: 12px; left: 14px; z-index: 10; pointer-events: none;
      padding: 8px 12px; border-radius: 10px; font: 12px system-ui;
      background: color-mix(in oklab, var(--card) 78%, transparent); border: 1px solid var(--bd-soft);
      -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
    }
    .legend:empty { display: none; }
    .legend b { font-size: 13px; }
    .up { color: var(--buy); } .dn { color: var(--sell); } .ltpc { color: var(--amber); }

    /* ── right-click order menu ─────────────────────────────────── */
    #ctxmenu {
      position: fixed; z-index: 60; min-width: 230px; padding: 5px;
      background: var(--card); border: 1px solid var(--bd); border-radius: 10px;
      box-shadow: 0 16px 40px rgb(0 0 0 / .5); font: 13px system-ui;
    }
    #ctxmenu .ctx-head { color: var(--faint); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 4px 10px 2px; }
    #ctxmenu button {
      display: flex; align-items: center; gap: 10px; width: 100%;
      background: transparent; border: 0; border-radius: 7px; color: var(--tx);
      padding: 7px 10px; cursor: pointer; font: inherit; transition: background .12s;
    }
    #ctxmenu button:hover { background: var(--muted); }
    #ctxmenu button:disabled { cursor: not-allowed; opacity: .35; }
    #ctxmenu button::before { content: ''; width: 7px; height: 7px; border-radius: 2px; flex: none; }
    #ctxmenu button.buy::before { background: var(--buy); }
    #ctxmenu button.sell::before { background: var(--sell); }
    #ctxmenu button span { margin-right: auto; }
    #ctxmenu hr { border: 0; border-top: 1px solid var(--bd-soft); margin: 5px 8px; }

    /* toast */
    #toast {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(8px); z-index: 70;
      background: var(--card); color: var(--tx); border: 1px solid var(--bd); border-radius: 10px;
      padding: 9px 16px; font-size: 13px; box-shadow: 0 12px 34px rgb(0 0 0 / .45);
      opacity: 0; transition: opacity .2s, transform .2s; pointer-events: none; max-width: 70vw;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.err { border-color: var(--destructive); }
    #toast.ok { border-color: var(--buy); }
  </style>
</head>

  <header class="topbar">
    <div class="group search">
      <input type="text" id="symsearch" class="field" placeholder="Search symbol… (e.g. RELIANCE, NIFTY FUT)" autocomplete="off" spellcheck="false" />
      <div class="search-pop" id="searchpop" hidden></div>
    </div>
    <select id="exchange" class="field" title="exchange filter for search">
      <option value="">All exchanges</option>
      <option>NSE</option><option>NFO</option><option>BSE</option><option>BFO</option>
      <option>MCX</option><option>CDS</option><option>BCD</option><option>NCO</option>
      <option>NSE_INDEX</option><option>BSE_INDEX</option>
    </select>
    <div class="divider"></div>
    <select id="interval" class="field" title="bar interval"></select>
    <select id="ctype" class="field" title="chart type">
      <option value="candlestick">Candles</option>
      <option value="hollow-candle">Hollow Candles</option>
      <option value="bar">Bars (OHLC)</option>
      <option value="high-low">High-Low</option>
      <option value="volume-candle">Volume Candles</option>
      <option value="line">Line</option>
      <option value="line-markers">Line + Markers</option>
      <option value="step">Step</option>
      <option value="area">Area</option>
      <option value="hlc-area">HLC Area</option>
      <option value="baseline">Baseline</option>
      <option value="heikin-ashi">Heikin Ashi</option>
      <option value="renko">Renko</option>
      <option value="range">Range Bars</option>
      <option value="line-break">Line Break</option>
    </select>
    <div class="divider"></div>
    <label class="lbl" id="qtylbl">Qty <input type="number" id="qty" class="field field--qty" value="1" min="1" /></label>
    <span id="lotinfo"></span>
    <select id="product" class="field" title="product"></select>
    <div class="divider"></div>
    <div class="group">
      <button id="fit" class="btn" title="fit content + autoscale (double-click chart does the same)" aria-label="fit content">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3m8 0h3a2 2 0 0 0 2-2v-3"/></svg>
      </button>
      <button id="snap" class="btn" title="save chart as PNG (Alt+Shift+S)" aria-label="save chart image">

      </button>
    </div>

    <span id="status"></span>
    <span class="led" id="wsled" title="connecting…"></span>
    <span class="chip chip--ltp" id="ltp">LTP —</span>
  </header>

  <main class="stage">
    <div id="chart"></div>
    <div class="legend" id="legend"></div>
  </main>

  <!-- right-click order menu (price under the cursor) -->
  <div id="ctxmenu" hidden>
    <div class="ctx-head">Market</div>
    <button class="buy" data-side="BUY" data-type="MARKET"><span>Buy Market</span></button>
    <button class="sell" data-side="SELL" data-type="MARKET"><span>Sell Market</span></button>
    <hr>
    <div class="ctx-head">Limit</div>
    <button class="buy" data-side="BUY" data-type="LIMIT"><span>Buy Limit</span></button>
    <button class="sell" data-side="SELL" data-type="LIMIT"><span>Sell Limit</span></button>
    <hr>
    <div class="ctx-head">Stop</div>
    <button class="buy" data-side="BUY" data-type="SL"><span>Buy Stop (SL)</span></button>
    <button class="sell" data-side="SELL" data-type="SL"><span>Sell Stop (SL)</span></button>
  </div>

  <div id="toast"></div>

  <script type="module" src="/trading/static/app.js"></script>
</body>
</html>
