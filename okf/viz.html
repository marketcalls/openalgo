 number (1, 2, 3...) |\n| orderid | string | Order ID from broker |\n| quantity | number | Quantity for this order |\n| status | string | \"success\" or \"error\" |\n| message | string | Error message (on failure) |\n\n## How Split Orders Work\n\nFor a total quantity of 105 with splitsize of 20:\n\n```\nOrder 1: 20 units\nOrder 2: 20 units\nOrder 3: 20 units\nOrder 4: 20 units\nOrder 5: 20 units\nOrder 6: 5 units (remainder)\n-----------------\nTotal: 105 units\n```\n\n## Notes\n\n- **Maximum 100 orders** per split request\n- The last order contains the **remainder** (quantity % splitsize)\n- Orders are placed **sequentially** with a small delay between them\n- Use for:\n  - **Large F&O orders**: Splitting to stay within freeze quantity limits\n  - **Reducing market impact**: Spreading execution over multiple orders\n  - **TWAP strategies**: Time-weighted average price execution\n- If splitsize is larger than quantity, a single order is placed\n- All split orders share the same price type and price\n\n## Freeze Quantity Reference\n\nCommon freeze quantities for popular F&O contracts:\n\n| Contract | Freeze Quantity |\n|----------|-----------------|\n| NIFTY | 1800 lots |\n| BANKNIFTY | 900 lots |\n| FINNIFTY | 1200 lots |\n| Stock Options | Varies by stock |\n\n# Citations\n- Official docs: https://docs.openalgo.in\n- Source: https://github.com/marketcalls/openalgo/blob/main/docs/api/order-management/splitorder.md", "api/rate-limiting": "# Rate Limiting\n\nTo protect OpenAlgo from abuse and ensure fair usage, rate limits are enforced at both login and API levels. These limits are configurable via the `.env` file and apply globally per IP address. They apply across the whole OpenAlgo API \u2014 see the [bundle overview](../overview.md) for the full endpoint catalog.\n\n## UI Login Rate Limits\n\nOpenAlgo applies two login-specific rate limits:\n\n| Scope | Limit | Description |\n|-------|-------|-------------|\n| Per Minute | 5 per minute | Allows a maximum of 5 login attempts per minute |\n| Per Hour | 25 per hour | Allows a maximum of 25 login attempts per hour |\n\nThese limits help prevent brute-force login attempts and secure user accounts.\n\n## API Rate Limits\n\nOpenAlgo implements differentiated rate limiting for various types of operations:\n\n### Order Management APIs\n\n| Scope | Limit | Description |\n|-------|-------|-------------|\n| Per Second | 10 per second | Order placement, modification, and cancellation |\n\n**Applies to:**\n- `/api/v1/placeorder` - Place new orders\n- `/api/v1/modifyorder` - Modify existing orders\n- `/api/v1/cancelorder` - Cancel orders\n\n### Smart Order API\n\n| Scope | Limit | Description |\n|-------|-------|-------------|\n| Per Second | 2 per second | Multi-leg smart order placement operations |\n\n**Applies to:**\n- `/api/v1/placesmartorder` - Place multi-leg smart orders\n\nSmart orders have the most restrictive limit due to their complexity and additional processing requirements.\n\n### General APIs\n\n| Scope | Limit | Description |\n|-------|-------|-------------|\n| Per Second | 50 per second | All other API endpoints including market data |\n\n**Applies to all other API endpoints including:**\n- Market data APIs (quotes, depth, history)\n- Account APIs (funds, positions, holdings)\n- Information APIs (orderbook, tradebook)\n- Search and symbol APIs\n\n### Webhook APIs\n\n| Scope | Limit | Description |\n|-------|-------|-------------|\n| Per Minute | 100 per minute | External webhook endpoints from trading platforms |\n\n**Applies to:**\n- `/strategy/webhook/<webhook_id>` - Strategy webhook from external platforms\n- `/chartink/webhook/<webhook_id>` - ChartInk webhook from external platforms\n\nThese limits protect against external DoS attacks and webhook flooding.\n\n### Strategy Management APIs\n\n| Scope | Limit | Description |\n|-------|-------|-------------|\n| Per Minute | 200 per minute | Strategy creation, modification, and deletion |\n\n**Applies to:**\n- `/strategy/new` - Create new strategies\n- `/strategy/<id>/delete` - Delete strategies\n- `/strategy/<id>/configure` - Configure strategy symbols\n- `/chartink/new` - Create new ChartInk strategies\n- `/chartink/<id>/delete` - Delete ChartInk strategies\n- `/chartink/<id>/configure` - Configure ChartInk strategy symbols\n\n## Configuration via .env\n\nYou can adjust the rate limits by editing the following variables in your `.env` file:\n\n```env\n# Login rate limits\nLOGIN_RATE_LIMIT_MIN=\"5 per minute\"\nLOGIN_RATE_LIMIT_HOUR=\"25 per hour\"\n\n# API rate limits\nAPI_RATE_LIMIT=\"50 per second\"\nORDER_RATE_LIMIT=\"10 per second\"\nSMART_ORDER_RATE_LIMIT=\"10 per second\"\nWEBHOOK_RATE_LIMIT=\"100 per minute\"\nSTRATEGY_RATE_LIMIT=\"200 per minute\"\n```\n\nThese limits follow [Flask-Limiter syntax](https://flask-limiter.readthedocs.io/en/stable/#rate-limit-string-format) and support formats like:\n- `10 per second`\n- `100 per minute`\n- `1000 per day`\n- `10 per second;40 per minute` (compound \u2014 both limits enforced simultaneously)\n\n## What Happens When Limits Are Exceeded\n\nIf a client exceeds any configured rate limit:\n\n1. The server will respond with HTTP status `429 Too Many Requests`\n2. A `Retry-After` header will be sent with the time to wait before retrying\n3. Further requests will be blocked until the rate window resets\n\n## Error Response\n\n```json\n{\n  \"status\": \"error\",\n  \"message\": \"Rate limit exceeded. Please try again later.\"\n}\n```\n\n## Security Impact\n\nThe rate limiting implementation provides essential protection:\n\n### Critical Protection\n\n| Protection | Description |\n|------------|-------------|\n| External DoS Attacks | Webhook endpoints are protected from unlimited external requests |\n| System Overload | Strategy operations are protected from flooding |\n| Resource Exhaustion | Prevents accidental system overwhelming |\n\n### Attack Vector Mitigation\n\n| Attack | Protection |\n|--------|------------|\n| Webhook Flooding | External platforms cannot flood webhook endpoints |\n| Strategy Abuse | Prevents rapid strategy creation/deletion attempts |\n| Order Flooding | Prevents overwhelming the order management system |\n\n## Implementation Details\n\n### Rate Limiting Strategy\n\nOpenAlgo uses the **moving-window** strategy for rate limiting, which provides more accurate rate limiting compared to fixed-window approaches.\n\n### Storage Backend\n\nRate limit counters are stored in memory (`memory://`), which means:\n- Fast performance with minimal latency\n- Counters reset when the application restarts\n- Suitable for single-user deployments\n\n### Key Function\n\nRate limits are applied per IP address using `get_remote_address` as the key function. Each unique IP address has its own rate limit counter.\n\n## Recommendations\n\n### For API Consumers\n\n- Avoid retrying failed login attempts rapidly\n- Spread out API requests using sleep/delay logic or a rate-limiter in your client code\n- Use queues or batching when dealing with large volumes of data or orders\n- Implement exponential backoff when receiving 429 errors\n\n### For Webhook Integration\n\n- Ensure webhook calls are spread out appropriately\n- Implement retry logic with delays for webhook failures\n- Monitor webhook success rates to detect rate limiting\n\n### For Strategy Management\n\n- Avoid rapid creation/deletion of strategies\n- Batch symbol configuration operations when possible\n- Implement proper error handling for strategy operations\n\n## Troubleshooting\n\n### Common Issues\n\n**\"Rate limit exceeded\" errors**\n- Check your request frequency\n- Implement proper retry logic with delays\n- Consider using batch operations\n\n**Webhook failures**\n- Verify webhook rate limits are appropriate for your platform\n- Check if external platforms are respecting rate limits\n- Monitor webhook logs for patterns\n\n**Strategy operation failures**\n- Ensure strategy operations are not happening too rapidly\n- Check for automated scripts that might be creating excessive requests\n- Verify proper error handling in strategy management code\n\n## Customization\n\nTo modify rate limits:\n\n1. Update the values in your `.env` file\n2. Restart the application for changes to take effect\n\nExample customization:\n\n```env\n# Increase webhook rate limit for high-frequency platforms\nWEBHOOK_RATE_LIMIT=\"200 per minute\"\n\n# Decrease strategy operations for tighter control\nSTRATEGY_RATE_LIMIT=\"100 per minute\"\n\n# Increase order rate limit for active trading\nORDER_RATE_LIMIT=\"20 per second\"\n```\n\n# Citations\n- Official docs: https://docs.openalgo.in\n- Source: https://github.com/marketcalls/openalgo/blob/main/docs/api/rate-limiting.md", "api/symbol-services/expiry": "# Expiry\n\nGet available expiry dates for a futures or options symbol. The `symbol` input uses the OpenAlgo [symbol format](../../sdk/symbol-format.md).\n\n## Endpoint URL\n\n```http\nLocal Host   :  POST http://127.0.0.1:5000/api/v1/expiry\nNgrok Domain :  POST https://<your-ngrok-domain>.ngrok-free.app/api/v1/expiry\nCustom Domain:  POST https://<your-custom-domain>/api/v1/expiry\n```\n\n## Sample API Request\n\n```json\n{\n  \"apikey\": \"<your_app_apikey>\",\n  \"symbol\": \"NIFTY\",\n  \"exchange\": \"NFO\",\n  \"instrumenttype\": \"options\"\n}\n```\n\n## Sample cURL Request\n\n```bash\ncurl -X POST http://127.0.0.1:5000/api/v1/expiry \\\n  -H 'Content-Type: application/json' \\\n  -d '{\n  \"apikey\": \"<your_app_apikey>\",\n  \"symbol\": \"NIFTY\",\n  \"exchange\": \"NFO\",\n  \"instrumenttype\": \"options\"\n}'\n```\n\n## Sample API Response\n\n```json\n{\n  \"status\": \"success\",\n  \"message\": \"Found 18 expiry dates for NIFTY options in NFO\",\n  \"data\": [\n    \"10-JUL-25\",\n    \"17-JUL-25\",\n    \"24-JUL-25\",\n    \"31-JUL-25\",\n    \"07-AUG-25\",\n    \"28-AUG-25\",\n    \"25-SEP-25\",\n    \"24-DEC-25\",\n    \"26-MAR-26\",\n    \"25-JUN-26\",\n    \"31-DEC-26\",\n    \"24-JUN-27\",\n    \"30-DEC-27\",\n    \"29-JUN-28\",\n    \"28-DEC-28\",\n    \"28-JUN-29\",\n    \"27-DEC-29\",\n    \"25-JUN-30\"\n  ]\n}\n```\n\n## Sample API Request (Futures)\n\n```json\n{\n  \"apikey\": \"<your_app_apikey>\",\n  \"symbol\": \"NIFTY\",\n  \"exchange\": \"NFO\",\n  \"instrumenttype\": \"futures\"\n}\n```\n\n## Request Body\n\n| Parameter | Description | Mandatory/Optional | Default Value |\n|-----------|-------------|-------------------|---------------|\n| apikey | Your OpenAlgo API key | Mandatory | - |\n| symbol | Underlying symbol (e.g., NIFTY, BANKNIFTY) | Mandatory | - |\n| exchange | Exchange code: NFO, BFO, CDS, BCD, MCX | Mandatory | - |\n| instrumenttype | Instrument type: \"options\" or \"futures\" | Mandatory | - |\n\nValid values for `exchange` are listed in the [order constants](../../sdk/order-constants.md) reference.\n\n## Response Fields\n\n| Field | Type | Description |\n|-------|------|-------------|\n| status | string | \"success\" or \"error\" |\n| message | string | Summary of results |\n| data | array | Array of expiry dates in DD-MMM-YY format |\n\n## Notes\n\n- Expiry dates are sorted in **ascending order** (nearest first)\n- Weekly expiries are included for index options (NIFTY, BANKNIFTY)\n- Monthly expiries extend further into the future\n- Use this data to populate expiry dropdowns in your application\n- Format is **DD-MMM-YY** (e.g., 10-JUL-25)\n\n## Use Cases\n\n- **Options trading**: Get available expiries for option selection\n- **Futures trading**: Find current and far-month futures\n- **Strategy building**: Select appropriate expiry for strategy\n\n# Citations\n- Official docs: https://docs.openalgo.in\n- Source: https://github.com/marketcalls/openalgo/blob/main/docs/api/symbol-services/expiry.md", "api/symbol-services/instruments": "# Instruments\n\nGet the complete list of instruments/symbols available for trading. Can be filtered by exchange. Every entry carries an OpenAlgo `symbol` in the standard [symbol format](../../sdk/symbol-format.md).\n\n## Endpoint URL\n\n```http\nLocal Host   :  POST http://127.0.0.1:5000/api/v1/instruments\nNgrok Domain :  POST https://<your-ngrok-domain>.ngrok-free.app/api/v1/instruments\nCustom Domain:  POST https://<your-custom-domain>/api/v1/instruments\n```\n\n## Sample API Request\n\n```json\n{\n  \"apikey\": \"<your_app_apikey>\",\n  \"exchange\": \"NSE\"\n}\n```\n\n## Sample cURL Request\n\n```bash\ncurl -X POST http://127.0.0.1:5000/api/v1/instruments \\\n  -H 'Content-Type: application/json' \\\n  -d '{\n  \"apikey\": \"<your_app_apikey>\",\n  \"exchange\": \"NSE\"\n}'\n```\n\n## Sample API Response\n\n```json\n{\n  \"status\": \"success\",\n  \"message\": \"Found 3046 instruments\",\n  \"data\": [\n    {\n      \"symbol\": \"RELIANCE\",\n      \"brsymbol\": \"RELIANCE-EQ\",\n      \"name\": \"RELIANCE INDUSTRIES LTD\",\n      \"exchange\": \"NSE\",\n      \"brexchange\": \"NSE\",\n      \"token\": \"2885\",\n      \"expiry\": null,\n      \"strike\": -1.0,\n      \"lotsize\": 1,\n      \"instrumenttype\": \"EQ\",\n      \"tick_size\": 0.05\n    },\n    {\n      \"symbol\": \"TCS\",\n      \"brsymbol\": \"TCS-EQ\",\n      \"name\": \"TATA CONSULTANCY SERVICES\",\n      \"exchange\": \"NSE\",\n      \"brexchange\": \"NSE\",\n      \"token\": \"11536\",\n      \"expiry\": null,\n      \"strike\": -1.0,\n      \"lotsize\": 1,\n      \"instrumenttype\": \"EQ\",\n      \"tick_size\": 0.05\n    }\n  ]\n}\n```\n\n## Sample API Request (All Exchanges)\n\n```json\n{\n  \"apikey\": \"<your_app_apikey>\"\n}\n```\n\n## Request Body\n\n| Parameter | Description | Mandatory/Optional | Default Value |\n|-----------|-------------|-------------------|---------------|\n| apikey | Your OpenAlgo API key | Mandatory | - |\n| exchange | Exchange filter: NSE, BSE, NFO, BFO, CDS, BCD, MCX | Optional | All exchanges |\n| format | Output format: \"json\" or \"csv\" | Optional | json |\n\nValid values for `exchange` are listed in the [order constants](../../sdk/order-constants.md) reference.\n\n## Response Fields\n\n| Field | Type | Description |\n|-------|------|-------------|\n| status | string | \"success\" or \"error\" |\n| message | string | Number of instruments found |\n| data | array | Array of instrument objects |\n\n### Data Array Fields\n\n| Field | Type | Description |\n|-------|------|-------------|\n| symbol | string | OpenAlgo standard symbol |\n| brsymbol | string | Broker-specific symbol |\n| name | string | Full company/instrument name |\n| exchange | string | OpenAlgo exchange code |\n| brexchange | string | Broker-specific exchange code |\n| token | string | Broker-specific instrument token |\n| expiry | string | Expiry date (null for equity) |\n| strike | number | Strike price (-1 for non-options) |\n| lotsize | number | Lot size (1 for equity) |\n| instrumenttype | string | EQ, FUT, CE, PE |\n| tick_size | number | Minimum price movement |\n\n## CSV Export\n\nRequest with `format: \"csv\"` to get data as downloadable CSV:\n\n```json\n{\n  \"apikey\": \"<your_app_apikey>\",\n  \"exchange\": \"NSE\",\n  \"format\": \"csv\"\n}\n```\n\nThe response will include `Content-Disposition` header for file download.\n\n## Notes\n\n- Without exchange filter, returns instruments from **all exchanges** (can be large)\n- For NFO/BFO, includes all futures and options contracts\n- Data is refreshed daily with master contract updates\n- Use CSV format for importing into spreadsheets or databases\n- Response can be large for F&O exchanges (50,000+ instruments)\n\n## Exchange Instrument Counts (Approximate)\n\n| Exchange | Instruments |\n|----------|-------------|\n| NSE | ~3,000 |\n| BSE | ~5,000 |\n| NFO | ~50,000+ |\n| BFO | ~30,000+ |\n| CDS | ~500 |\n| MCX | ~200 |\n\n# Citations\n- Official docs: https://docs.openalgo.in\n- Source: https://github.com/marketcalls/openalgo/blob/main/docs/api/symbol-services/instruments.md", "api/symbol-services/search": "# Search\n\nSearch for symbols by name, strike price, expiry, or other criteria. Results are returned in the OpenAlgo [symbol format](../../sdk/symbol-format.md).\n\n## Endpoint URL\n\n```http\nLocal Host   :  POST http://127.0.0.1:5000/api/v1/search\nNgrok Domain :  POST https://<your-ngrok-domain>.ngrok-free.app/api/v1/search\nCustom Domain:  POST https://<your-custom-domain>/api/v1/search\n```\n\n## Sample API Request\n\n```json\n{\n  \"apikey\": \"<your_app_apikey>\",\n  \"query\": \"NIFTY 26000 DEC CE\",\n  \"exchange\": \"NFO\"\n}\n```\n\n## Sample cURL Request\n\n```bash\ncurl -X POST http://127.0.0.1:5000/api/v1/search \\\n  -H 'Content-Type: application/json' \\\n  -d '{\n  \"apikey\": \"<your_app_apikey>\",\n  \"query\": \"NIFTY 26000 DEC CE\",\n  \"exchange\": \"NFO\"\n}'\n```\n\n## Sample API Response\n\n```json\n{\n  \"status\": \"success\",\n  \"message\": \"Found 7 matching symbols\",\n  \"data\": [\n    {\n      \"brexchange\": \"NSE_FO\",\n      \"brsymbol\": \"NIFTY 26000 CE 30 DEC 25\",\n      \"exchange\": \"NFO\",\n      \"expiry\": \"30-DEC-25\",\n      \"freeze_qty\": 1800,\n      \"instrumenttype\": \"CE\",\n      \"lotsize\": 65,\n      \"name\": \"NIFTY\",\n      \"strike\": 26000,\n      \"symbol\": \"NIFTY30DEC2526000CE\",\n      \"tick_size\": 5,\n      \"token\": \"NSE_FO|71399\"\n    },\n    {\n      \"brexchange\": \"NSE_FO\",\n      \"brsymbol\": \"NIFTY 26000 CE 29 DEC 26\",\n      \"exchange\": \"NFO\",\n      \"expiry\": \"29-DEC-26\",\n      \"freeze_qty\": 1800,\n      \"instrumenttype\": \"CE\",\n      \"lotsize\": 65,\n      \"name\": \"NIFTY\",\n      \"strike\": 26000,\n      \"symbol\": \"NIFTY29DEC2626000CE\",\n      \"tick_size\": 5,\n      \"token\": \"NSE_FO|71505\"\n    }\n  ]\n}\n```\n\n## Request Body\n\n| Parameter | Description | Mandatory/Optional | Default Value |\n|-----------|-------------|-------------------|---------------|\n| apikey | Your OpenAlgo API key | Mandatory | - |\n| query | Search query string | Mandatory | - |\n| exchange | Exchange code: NSE, BSE, NFO, BFO, CDS, BCD, MCX | Mandatory | - |\n\nValid values for `exchange` are listed in the [order constants](../../sdk/order-constants.md) reference.\n\n## Response Fields\n\n| Field | Type | Description |\n|-------|------|-------------|\n| status | string | \"success\" or \"error\" |\n| message | string | Number of matching symbols found |\n| data | array | Array of matching symbol objects |\n\n### Data Array Fields\n\n| Field | Type | Description |\n|-------|------|-------------|\n| symbol | string | OpenAlgo standard symbol |\n| brsymbol | string | Broker-specific symbol |\n| name | string | Underlying/symbol name |\n| exchange | string | OpenAlgo exchange code |\n| brexchange | string | Broker-specific exchange code |\n| instrumenttype | string | CE, PE, FUT, EQ |\n| expiry | string | Expiry date (DD-MMM-YY) |\n| strike | number | Strike price |\n| lotsize | number | Lot size |\n| tick_size | number | Tick size |\n| freeze_qty | number | Maximum quantity per order |\n| token | string | Broker-specific token |\n\n## Search Tips\n\n| Query Format | Example | Finds |\n|--------------|---------|-------|\n| Symbol only | `RELIANCE` | All RELIANCE instruments |\n| Symbol + Strike | `NIFTY 26000` | NIFTY options at 26000 strike |\n| Symbol + Strike + Type | `NIFTY 26000 CE` | NIFTY 26000 Call options |\n| Symbol + Month + Type | `NIFTY DEC CE` | NIFTY December Call options |\n| Symbol + Strike + Month + Type | `NIFTY 26000 DEC CE` | Specific option series |\n\n## Notes\n\n- Search is **case-insensitive**\n- Results are limited to avoid overwhelming response\n- Use more specific queries for better results\n- The search covers all available expiries for the exchange\n\n# Citations\n- Official docs: https://docs.openalgo.in\n- Source: https://github.com/marketcalls/openalgo/blob/main/docs/api/symbol-services/search.md", "api/symbol-services/symbol": "# Symbol\n\nGet detailed information about a specific trading symbol including broker-specific symbol mapping. The `symbol` input uses the OpenAlgo [symbol format](../../sdk/symbol-format.md).\n\n## Endpoint URL\n\n```http\nLocal Host   :  POST http://127.0.0.1:5000/api/v1/symbol\nNgrok Domain :  POST https://<your-ngrok-domain>.ngrok-free.app/api/v1/symbol\nCustom Domain:  POST https://<your-custom-domain>/api/v1/symbol\n```\n\n## Sample API Request (Equity)\n\n```json\n{\n  \"apikey\": \"<your_app_apikey>\",\n  \"symbol\": \"RELIANCE\",\n  \"exchange\": \"NSE\"\n}\n```\n\n## Sample cURL Request\n\n```bash\ncurl -X POST http://127.0.0.1:5000/api/v1/symbol \\\n  -H 'Content-Type: application/json' \\\n  -d '{\n  \"apikey\": \"<your_app_apikey>\",\n  \"symbol\": \"RELIANCE\",\n  \"exchange\": \"NSE\"\n}'\n```\n\n## Sample API Response (Equity)\n\n```json\n{\n  \"status\": \"success\",\n  \"data\": {\n    \"id\": 979,\n    \"name\": \"RELIANCE\",\n    \"symbol\": \"RELIANCE\",\n    \"brsymbol\": \"RELIANCE-EQ\",\n    \"exchange\": \"NSE\",\n    \"brexchange\": \"NSE\",\n    \"instrumenttype\": \"\",\n    \"expiry\": \"\",\n    \"strike\": -0.01,\n    \"lotsize\": 1,\n    \"tick_size\": 0.05,\n    \"token\": \"2885\"\n  }\n}\n```\n\n## Sample API Request (Futures)\n\n```json\n{\n  \"apikey\": \"<your_app_apikey>\",\n  \"symbol\": \"NIFTY30DEC25FUT\",\n  \"exchange\": \"NFO\"\n}\n```\n\n## Sample API Response (Futures)\n\n```json\n{\n  \"status\": \"success\",\n  \"data\": {\n    \"brexchange\": \"NSE_FO\",\n    \"brsymbol\": \"NIFTY FUT 30 DEC 25\",\n    \"exchange\": \"NFO\",\n    \"expiry\": \"30-DEC-25\",\n    \"freeze_qty\": 1800,\n    \"id\": 57900,\n    \"instrumenttype\": \"FUT\",\n    \"lotsize\": 65,\n    \"name\": \"NIFTY\",\n    \"strike\": 0,\n    \"symbol\": \"NIFTY30DEC25FUT\",\n    \"tick_size\": 10,\n    \"token\": \"NSE_FO|49543\"\n  }\n}\n```\n\n## Request Body\n\n| Parameter | Description | Mandatory/Optional | Default Value |\n|-----------|-------------|-------------------|---------------|\n| apikey | Your OpenAlgo API key | Mandatory | - |\n| symbol | Trading symbol in OpenAlgo format | Mandatory | - |\n| exchange | Exchange code: NSE, BSE, NFO, BFO, CDS, BCD, MCX | Mandatory | - |\n\nValid values for `exchange` are listed in the [order constants](../../sdk/order-constants.md) reference.\n\n## Response Fields\n\n| Field | Type | Description |\n|-------|------|-------------|\n| status | string | \"success\" or \"error\" |\n| data | object | Symbol details object |\n\n### Data Object Fields\n\n| Field | Type | Description |\n|-------|------|-------------|\n| id | number | Internal symbol ID |\n| name | string | Symbol name/underlying |\n| symbol | string | OpenAlgo standard symbol |\n| brsymbol | string | Broker-specific symbol |\n| exchange | string | OpenAlgo exchange code |\n| brexchange | string | Broker-specific exchange code |\n| instrumenttype | string | Instrument type (EQ, FUT, CE, PE) |\n| expiry | string | Expiry date for F&O (DD-MMM-YY) |\n| strike | number | Strike price for options (-0.01 for non-options) |\n| lotsize | number | Lot size for F&O (1 for equity) |\n| tick_size | number | Minimum price movement |\n| freeze_qty | number | Maximum quantity per order (for F&O) |\n| token | string | Broker-specific instrument token |\n\n## Notes\n\n- Use this endpoint to get the **broker-specific symbol** for order placement\n- The **lotsize** field shows:\n  - NIFTY: 65\n  - BANKNIFTY: 30\n  - SENSEX: 20\n  - Equity: 1\n- The **freeze_qty** field indicates the maximum quantity allowed per order\n- The **token** is used by brokers for faster symbol lookup\n\n# Citations\n- Official docs: https://docs.openalgo.in\n- Source: https://github.com/marketcalls/openalgo/blob/main/docs/api/symbol-services/symbol.md", "api/websocket-streaming/depth": "# Depth (WebSocket)\n\nSubscribe to real-time market depth (Level 2) updates via WebSocket.\n\n## WebSocket URL\n\n```\nLocal Host   :  ws://127.0.0.1:8765\nCustom Host  :  ws://<your-host>:8765\n```\n\n## Subscribe to Depth\n\nThe subscribe, unsubscribe, and update messages follow the WebSocket\n[message format](../../sdk/websockets-format.md). Each instrument object\ncarries an `exchange` (see [order code constants](../../sdk/order-constants.md))\nand a `symbol` (see [symbol format](../../sdk/symbol-format.md)).\n\n### Subscribe Message\n\n```json\n{\n  \"action\": \"subscribe\",\n  \"mode\": \"depth\",\n  \"instruments\": [\n    {\"exchange\": \"NSE\", \"symbol\": \"RELIANCE\"},\n    {\"exchange\": \"NSE\", \"symbol\": \"INFY\"}\n  ]\n}\n```\n\n### Depth Update Message\n\n```json\n{\n  \"type\": \"depth\",\n  \"data\": {\n    \"exchange\": \"NSE\",\n    \"symbol\": \"RELIANCE\",\n    \"ltp\": 1187.75,\n    \"ltq\": 100,\n    \"open\": 1172.0,\n    \"high\": 1196.6,\n    \"low\": 1163.3,\n    \"close\": 1165.7,\n    \"volume\": 14414545,\n    \"totalbuyqty\": 591351,\n    \"totalsellqty\": 835701,\n    \"bids\": [\n      {\"price\": 1187.70, \"quantity\": 886},\n      {\"price\": 1187.65, \"quantity\": 212},\n      {\"price\": 1187.60, \"quantity\": 351},\n      {\"price\": 1187.55, \"quantity\": 343},\n      {\"price\": 1187.50, \"quantity\": 399}\n    ],\n    \"asks\": [\n      {\"price\": 1187.80, \"quantity\": 767},\n      {\"price\": 1187.85, \"quantity\": 115},\n      {\"price\": 1187.90, \"quantity\": 162},\n      {\"price\": 1187.95, \"quantity\": 1121},\n      {\"price\": 1188.00, \"quantity\": 430}\n    ],\n    \"timestamp\": 1712572800000\n  }\n}\n```\n\n## Unsubscribe from Depth\n\n```json\n{\n  \"action\": \"unsubscribe\",\n  \"mode\": \"depth\",\n  \"instruments\": [\n    {\"exchange\": \"NSE\", \"symbol\": \"RELIANCE\"}\n  ]\n}\n```\n\n## Python SDK Example\n\nUses the [Python SDK](../../sdk/python-sdk.md) WebSocket client.\n\n```python\nfrom openalgo import api\nimport time\n\n# Initialize client with WebSocket\nclient = api(\n    api_key=\"your_api_key\",\n    host=\"http://127.0.0.1:5000\",\n    ws_url=\"ws://127.0.0.1:8765\"\n)\n\n# Instruments to subscribe\ninstruments = [\n    {\"exchange\": \"NSE\", \"symbol\": \"RELIANCE\"},\n    {\"exchange\": \"NSE\", \"symbol\": \"INFY\"}\n]\n\n# Callback for depth updates\ndef on_depth(data):\n    print(f\"Depth: {data['symbol']}\")\n    print(f\"  LTP: {data['ltp']}\")\n    print(f\"  Best Bid: {data['bids'][0]['price']} x {data['bids'][0]['quantity']}\")\n    print(f\"  Best Ask: {data['asks'][0]['price']} x {data['asks'][0]['quantity']}\")\n    print(f\"  Total Buy Qty: {data['totalbuyqty']}\")\n    print(f\"  Total Sell Qty: {data['totalsellqty']}\")\n\n# Connect and subscribe\nclient.connect()\nclient.subscribe_depth(instruments, on_data_received=on_depth)\n\n# Keep running\ntry:\n    time.sleep(60)\nfinally:\n    client.unsubscribe_depth(instruments)\n    client.disconnect()\n```\n\n## Message Fields\n\n### Subscribe/Unsubscribe Message\n\n| Field | Type | Description |\n|-------|------|-------------|\n| action | string | \"subscribe\" or \"unsubscribe\" |\n| mode | string | \"depth\" |\n| instruments | array | Array of instrument objects |\n\n### Depth Update Message\n\n| Field | Type | Description |\n|-------|------|-------------|\n| type | string | \"depth\" |\n| data | object | Depth data object |\n\n### Data Object\n\n| Field | Type | Description |\n|-------|------|-------------|\n| exchange | string | Exchange code |\n| symbol | string | Trading symbol |\n| ltp | number | Last traded price |\n| ltq | number | Last traded quantity |\n| open | number | Day's open price |\n| high | number | Day's high price |\n| low | number | Day's low price |\n| close | number | Previous close price |\n| volume | number | Total traded volume |\n| totalbuyqty | number | Total buy quantity in order book |\n| totalsellqty | number | Total sell quantity in order book |\n| bids | array | Top 5 bid levels |\n| asks | array | Top 5 ask levels |\n| timestamp | number | Update time (epoch ms) |\n\n### Bid/Ask Object\n\n| Field | Type | Description |\n|-------|------|-------------|\n| price | number | Price level |\n| quantity | number | Quantity at this level |\n\n## Notes\n\n- Depth mode provides **full order book** data (top 5 levels)\n- Highest bandwidth consumption among streaming modes\n- Updates on every order book change\n- Use for:\n  - Scalping strategies\n  - Order flow analysis\n  - Liquidity monitoring\n  - Smart order routing\n\n## Related Endpoints\n\n- [LTP WebSocket](./ltp.md) - Minimal data, lowest latency\n- [Quote WebSocket](./quote.md) - OHLCV data\n\n# Citations\n- Official docs: https://docs.openalgo.in\n- Source: https://github.com/marketcalls/openalgo/blob/main/docs/api/websocket-streaming/depth.md", "api/websocket-streaming/ltp": "# LTP (WebSocket)\n\nSubscribe to real-time Last Traded Price (LTP) updates via WebSocket.\n\n## WebSocket URL\n\n```\nLocal Host   :  ws://127.0.0.1:8765\nCustom Host  :  ws://<your-host>:8765\n```\n\n## Subscribe to LTP\n\nThe subscribe, unsubscribe, and update messages follow the WebSocket\n[message format](../../sdk/websockets-format.md). Each instrument object\ncarries an `exchange` (see [order code constants](../../sdk/order-constants.md))\nand a `symbol` (see [symbol format](../../sdk/symbol-format.md)).\n\n### Subscribe Message\n\n```json\n{\n  \"action\": \"subscribe\",\n  \"mode\": \"ltp\",\n  \"instruments\": [\n    {\"exchange\": \"NSE\", \"symbol\": \"RELIANCE\"},\n    {\"exchange\": \"NSE\", \"symbol\": \"INFY\"}\n  ]\n}\n```\n\n### LTP Update Message\n\n```json\n{\n  \"type\": \"ltp\",\n  \"data\": {\n    \"exchange\": \"NSE\",\n    \"symbol\": \"RELIANCE\",\n    \"ltp\": 1187.75,\n    \"timestamp\": 1712572800000\n  }\n}\n```\n\n## Unsubscribe from LTP\n\n```json\n{\n  \"action\": \"unsubscribe\",\n  \"mode\": \"ltp\",\n  \"instruments\": [\n    {\"exchange\": \"NSE\", \"symbol\": \"RELIANCE\"}\n  ]\n}\n```\n\n## Python SDK Example\n\nUses the [Python SDK](../../sdk/python-sdk.md) WebSocket client.\n\n```python\nfrom openalgo import api\nimport time\n\n# Initialize client with WebSocket\nclient = api(\n    api_key=\"your_api_key\",\n    host=\"http://127.0.0.1:5000\",\n    ws_url=\"ws://127.0.0.1:8765\"\n)\n\n# Instruments to subscribe\ninstruments = [\n    {\"exchange\": \"NSE\", \"symbol\": \"RELIANCE\"},\n    {\"exchange\": \"NSE\", \"symbol\": \"INFY\"}\n]\n\n# Callback for LTP updates\ndef on_ltp(data):\n    print(f\"LTP Update: {data['symbol']} = {data['ltp']}\")\n\n# Connect and subscribe\nclient.connect()\nclient.subscribe_ltp(instruments, on_data_received=on_ltp)\n\n# Keep running\ntry:\n    time.sleep(60)  # Run for 60 seconds\nfinally:\n    client.unsubscribe_ltp(instruments)\n    client.disconnect()\n```\n\n## Message Fields\n\n### Subscribe/Unsubscribe Message\n\n| Field | Type | Description |\n|-------|------|-------------|\n| action | string | \"subscribe\" or \"unsubscribe\" |\n| mode | string | \"ltp\" |\n| instruments | array | Array of instrument objects |\n\n### Instrument Object\n\n| Field | Type | Description |\n|-------|------|-------------|\n| exchange | string | Exchange code (NSE, BSE, NFO, etc.) |\n| symbol | string | Trading symbol |\n\n### LTP Update Message\n\n| Field | Type | Description |\n|-------|------|-------------|\n| type | string | \"ltp\" |\n| data | object | LTP data object |\n\n### Data Object\n\n| Field | Type | Description |\n|-------|------|-------------|\n| exchange | string | Exchange code |\n| symbol | string | Trading symbol |\n| ltp | number | Last traded price |\n| timestamp | number | Update time (epoch milliseconds) |\n\n## Notes\n\n- LTP mode provides **minimal data** for lowest latency\n- Updates are pushed **on every tick** (each trade)\n- Subscribe to multiple symbols in a single message\n- Use for:\n  - Price displays\n  - Trigger-based alerts\n  - Simple strategy signals\n\n## Related Endpoints\n\n- [Quote WebSocket](./quote.md) - More data including OHLC\n- [Depth WebSocket](./depth.md) - Full market depth\n\n# Citations\n- Official docs: https://docs.openalgo.in\n- Source: https://github.com/marketcalls/openalgo/blob/main/docs/api/websocket-streaming/ltp.md", "api/websocket-streaming/quote": "# Quote (WebSocket)\n\nSubscribe to real-time quote updates via WebSocket including OHLC and volume data.\n\n## WebSocket URL\n\n```\nLocal Host   :  ws://127.0.0.1:8765\nCustom Host  :  ws://<your-host>:8765\n```\n\n## Subscribe to Quotes\n\nThe subscribe, unsubscribe, and update messages follow the WebSocket\n[message format](../../sdk/websockets-format.md). Each instrument object\ncarries an `exchange` (see [order code constants](../../sdk/order-constants.md))\nand a `symbol` (see [symbol format](../../sdk/symbol-format.md)).\n\n### Subscribe Message\n\n```json\n{\n  \"action\": \"subscribe\",\n  \"mode\": \"quote\",\n  \"instruments\": [\n    {\"exchange\": \"NSE\", \"symbol\": \"RELIANCE\"},\n    {\"exchange\": \"NSE\", \"symbol\": \"INFY\"}\n  ]\n}\n```\n\n### Quote Update Message\n\n```json\n{\n  \"type\": \"quote\",\n  \"data\": {\n    \"exchange\": \"NSE\",\n    \"symbol\": \"RELIANCE\",\n    \"ltp\": 1187.75,\n    \"open\": 1172.0,\n    \"high\": 1196.6,\n    \"low\": 1163.3,\n    \"close\": 1165.7,\n    \"volume\": 14414545,\n    \"timestamp\": 1712572800000\n  }\n}\n```\n\n## Unsubscribe from Quotes\n\n```json\n{\n  \"action\": \"unsubscribe\",\n  \"mode\": \"quote\",\n  \"instruments\": [\n    {\"exchange\": \"NSE\", \"symbol\": \"RELIANCE\"}\n  ]\n}\n```\n\n## Python SDK Example\n\nUses the [Python SDK](../../sdk/python-sdk.md) WebSocket client.\n\n```python\nfrom openalgo import api\nimport time\n\n# Initialize client with WebSocket\nclient = api(\n    api_key=\"your_api_key\",\n    host=\"http://127.0.0.1:5000\",\n    ws_url=\"ws://127.0.0.1:8765\"\n)\n\n# Instruments to subscribe\ninstruments = [\n    {\"exchange\": \"NSE\", \"symbol\": \"RELIANCE\"},\n    {\"exchange\": \"NSE\", \"symbol\": \"INFY\"}\n]\n\n# Callback for quote updates\ndef on_quote(data):\n    print(f\"Quote: {data['symbol']}\")\n    print(f\"  LTP: {data['ltp']}\")\n    print(f\"  High: {data['high']}, Low: {data['low']}\")\n    print(f\"  Volume: {data['volume']}\")\n\n# Connect and subscribe\nclient.connect()\nclient.subscribe_quote(instruments, on_data_received=on_quote)\n\n# Keep running\ntry:\n    time.sleep(60)\nfinally:\n    client.unsubscribe_quote(instruments)\n    client.disconnect()\n```\n\n## Message Fields\n\n### Subscribe/Unsubscribe Message\n\n| Field | Type | Description |\n|-------|------|-------------|\n| action | string | \"subscribe\" or \"unsubscribe\" |\n| mode | string | \"quote\" |\n| instruments | array | Array of instrument objects |\n\n### Quote Update Message\n\n| Field | Type | Description |\n|-------|------|-------------|\n| type | string | \"quote\" |\n| data | object | Quote data object |\n\n### Data Object\n\n| Field | Type | Description |\n|-------|------|-------------|\n| exchange | string | Exchange code |\n| symbol | string | Trading symbol |\n| ltp | number | Last traded price |\n| open | number | Day's open price |\n| high | number | Day's high price |\n| low | number | Day's low price |\n| close | number | Previous close price |\n| volume | number | Total traded volume |\n| timestamp | number | Update time (epoch ms) |\n\n## Notes\n\n- Quote mode provides **OHLCV data** in addition to LTP\n- Updates are less frequent than LTP (on significant changes)\n- Use for:\n  - Market overview displays\n  - Technical analysis\n  - Charting applications\n\n## Related Endpoints\n\n- [LTP WebSocket](./ltp.md) - Minimal data, lowest latency\n- [Depth WebSocket](./depth.md) - Full market depth\n\n# Citations\n- Official docs: https://docs.openalgo.in\n- Source: https://github.com/marketcalls/openalgo/blob/main/docs/api/websocket-streaming/quote.md", "api/whatsapp-services/notify": "# WhatsApp Notify\n\nSend a WhatsApp message \u2014 text, image, document, or any combination \u2014 to\nyourself, a single recipient, or a small group (up to 5). This is the single\ntrader-facing send endpoint; everything you might do with `wa.send()` in a\nscript is exposed here. See the [WhatsApp Services overview](./overview.md)\nfor the architecture and security model.\n\n## Endpoint URL\n\n```http\nLocal Host   :  POST http://127.0.0.1:5000/api/v1/whatsapp/notify\nNgrok Domain :  POST https://<your-ngrok-domain>.ngrok-free.app/api/v1/whatsapp/notify\nCustom Domain:  POST https://<your-custom-domain>/api/v1/whatsapp/notify\n```\n\n## Sample API Requests\n\n### Send to yourself (paired device's own number)\n\n```json\n{\n  \"apikey\": \"<your_app_apikey>\",\n  \"self\": true,\n  \"message\": \"Build #482 finished in 1m 23s\"\n}\n```\n\n### Send to a single phone number\n\n```json\n{\n  \"apikey\": \"<your_app_apikey>\",\n  \"phone\": \"919876543210\",\n  \"message\": \"Order placed: BUY RELIANCE x 10 @ MARKET\"\n}\n```\n\n### Send to a linked OpenAlgo user\n\n```json\n{\n  \"apikey\": \"<your_app_apikey>\",\n  \"username\": \"rajan\",\n  \"message\": \"Daily summary attached\",\n  \"document_path\": \"/srv/reports/2026-05-17.pdf\",\n  \"filename\": \"summary.pdf\"\n}\n```\n\n### Small broadcast (max 5 recipients)\n\n```json\n{\n  \"apikey\": \"<your_app_apikey>\",\n  \"phones\": [\"919876543210\", \"919812345678\", \"919900112233\"],\n  \"image_path\": \"/srv/charts/nifty.png\",\n  \"caption\": \"NIFTY EOD chart\"\n}\n```\n\n## Sample cURL Request\n\n```bash\ncurl -X POST http://127.0.0.1:5000/api/v1/whatsapp/notify \\\n  -H 'Content-Type: application/json' \\\n  -d '{\n    \"apikey\": \"<your_app_apikey>\",\n    \"self\": true,\n    \"message\": \"Alert from OpenAlgo\"\n  }'\n```\n\n## Sample API Response\n\n### Fire-and-forget (default)\n\n```json\n{\n  \"status\": \"success\",\n  \"message\": \"Queued for 1 recipient(s)\",\n  \"queued\": 1\n}\n```\n\n### `wait_for_delivery: true`\n\n```json\n{\n  \"status\": \"success\",\n  \"message\": \"Delivered to 2, failed 0\",\n  \"data\": {\n    \"sent\":    [\"919876543210@s.whatsapp.net\", \"919812345678@s.whatsapp.net\"],\n    \"failed\":  [],\n    \"skipped\": 0\n  }\n}\n```\n\n## Request Body\n\n| Parameter | Type | Description |\n|-----------|------|-------------|\n| `apikey` | string | OpenAlgo API key. **Mandatory.** |\n| `self` | boolean | If `true`, send to the paired device's own number. |\n| `username` | string | OpenAlgo username \u2014 resolves through the linked-users table. |\n| `phone` | string | Single E.164 digit string (e.g. `919876543210`). |\n| `phones` | array of strings | Up to 5 E.164 digit strings (small broadcast). Anything beyond 5 is dropped. |\n| `message` | string | Text body. Optional if `image_path` or `document_path` is set. Max 4096 chars. |\n| `image_path` | string | Server-local path to an image file. |\n| `document_path` | string | Server-local path to a document file (PDF, CSV, etc.). |\n| `caption` | string | Caption attached to the image. For documents, sent as a follow-up text. |\n| `filename` | string | Override the document's display name on the recipient's device. |\n| `wait_for_delivery` | boolean | Default `false`. When `true`, block until wars returns and include per-recipient delivery report. |\n\nExactly one recipient form is required: `self`, `username`, `phone`, or\n`phones`. Combining is not supported.\n\n## Response Fields (async)\n\n| Field | Type | Description |\n|-------|------|-------------|\n| `status` | string | `success` or `error` |\n| `message` | string | Human-readable summary |\n| `queued` | int | Number of recipients dispatched to the alert pool |\n\n## Response Fields (`wait_for_delivery: true`)\n\n`data` contains the per-recipient report from `send_sync`:\n\n| Field | Type | Description |\n|-------|------|-------------|\n| `sent` | array | JIDs that wars confirmed accepted |\n| `failed` | array | `[{ \"to\": \"<jid>\", \"error\": \"<msg>\" }, ...]` |\n| `skipped` | int | Recipients trimmed by the 5-recipient cap |\n\n## Notes\n\n- The bot must be paired and connected for `notify` to deliver. Connect /\n  disconnect lives on the `/whatsapp` admin web UI; this REST namespace\n  intentionally does not expose those controls. If the bot is paused, the\n  message is queued in `whatsapp_notification_queue` for a later retry.\n- Image / document paths are read from the OpenAlgo server's filesystem,\n  not uploaded by the API call. Place files in a server-readable location\n  first.\n- **Attachment path allowlist.** For security, only paths inside the\n  directories listed in the `WHATSAPP_ATTACHMENT_ROOTS` env var are\n  accepted. The default (when unset) is `<openalgo>/db/attachments/` only.\n  Anything outside the allowlist returns `400 image_path is not allowed`.\n  Set `WHATSAPP_ATTACHMENT_ROOTS` to a comma-separated list of absolute\n  directories to expand it. Paths containing `..`, paths under sensitive\n  system trees (`/etc`, `/proc`, `/sys`, `/root`, `/var/log`, `C:\\Windows`,\n  `C:\\Users\\Default`), and symlinks that resolve outside the allowlist are\n  always rejected.\n- The 5-recipient cap is a ToS-safety guardrail \u2014 bulk-messaging patterns\n  can get the paired device unlinked by Meta. Use the official WhatsApp\n  Business API for genuine mass-messaging use cases.\n\n# Citations\n- Official docs: https://docs.openalgo.in\n- Source: https://github.com/marketcalls/openalgo/blob/main/docs/api/whatsapp-services/notify.md", "api/whatsapp-services/overview": "# WhatsApp Services Overview\n\nWhatsApp delivery via the unofficial multi-device protocol, powered by the\n[`wars`](https://pypi.org/project/wars/) library (Rust core via PyO3).\n\nOpenAlgo runs one paired WhatsApp Web session per install. Once paired\nfrom the `/whatsapp` admin page, the bot stays connected in the same\nFlask process that serves orders, so notifications fire from the same\nevent bus that drives Telegram alerts. Linked users can also run slash\ncommands against the bot (`/orderbook`, `/positions`, `/quote`, etc.)\nonce they send `/link <api_key>` from their phone.\n\n## Security model \u2014 minimal REST surface\n\nThe REST API at `/api/v1/whatsapp/` exposes **exactly one** endpoint:\n`POST /notify` (send a message). Everything else \u2014 pairing, unpairing,\nstarting / stopping the bot, reading or mutating config, listing linked\nrecipients, broadcasting to all of them, viewing stats, editing\npreferences \u2014 is **admin-only** and lives behind the Flask session cookie\nat `/whatsapp/...` (consumed by the React `/whatsapp` admin page).\n\nWhy this stance:\n\n- The paired-device session blob is functionally a credential to the\n  operator's WhatsApp account. A leaked API key must never be enough to\n  re-pair the bot or wipe an existing session.\n- A leaked API key must never let an attacker enumerate the operator's\n  linked contact list, change rate limits, or fan out to every linked\n  user via `/broadcast`.\n- The paired session blob (~300 KB of Signal Protocol private keys) is\n  encrypted at rest with a Fernet key derived from\n  `API_KEY_PEPPER + FERNET_SALT + \":whatsapp-session\"`. Anyone with the\n  `openalgo.db` file **and** the `.env` secrets can impersonate the\n  device \u2014 keep both secret.\n\n## REST endpoint\n\n| Endpoint | Method | Description |\n|----------|--------|-------------|\n| [Notify](./notify.md) | POST | Send text / image / document to self, one user, or up to 5 recipients. |\n\nThat is the entire public surface.\n\n## Admin operations (web UI only)\n\nPerformed on the logged-in `/whatsapp` page. Not exposed via API key:\n\n- **Pair** a new device (QR or pair-code).\n- **Unlink** the paired device (wipes the encrypted session blob).\n- **Start / Stop** the bot's WhatsApp connection.\n- **Config**: toggle broadcast, adjust rate limits, message length cap.\n- **Users**: list and revoke linked recipients.\n- **Broadcast**: send to every linked user matching filters.\n- **Stats**: command usage analytics.\n- **Preferences**: per-user notification toggles.\n\nThese are all routed through `blueprints/whatsapp.py` with\n`@check_session_validity`, so only the logged-in OpenAlgo admin can\ninvoke them.\n\n## Quick example: trade alert to yourself\n\n```bash\ncurl -X POST http://127.0.0.1:5000/api/v1/whatsapp/notify \\\n  -H 'Content-Type: application/json' \\\n  -d '{\n    \"apikey\": \"<your_app_apikey>\",\n    \"self\": true,\n    \"message\": \"Build #482 deployed. P&L: +1.2%\"\n  }'\n```\n\n## Quick example: chart to client + yourself\n\n```bash\ncurl -X POST http://127.0.0.1:5000/api/v1/whatsapp/notify \\\n  -H 'Content-Type: application/json' \\\n  -d '{\n    \"apikey\": \"<your_app_apikey>\",\n    \"phones\": [\"919876543210\", \"919812345678\"],\n    \"image_path\": \"/srv/charts/nifty_eod.png\",\n    \"caption\": \"NIFTY end-of-day chart\"\n  }'\n```\n\nUp to 5 recipients per call \u2014 anything beyond that is dropped. This is a\nToS-safety guardrail; bulk-messaging patterns can get the paired device\nunlinked by Meta.\n\n## Receiving messages (bot commands)\n\nOnce paired, any WhatsApp user can message the bot and run queries:\n\n```\n/link <YOUR_API_KEY>        # one-time, links this WhatsApp number to your OpenAlgo user\n/orderbook                  # today's orders\n/positions                  # open positions\n/funds                      # available cash\n/pnl                        # net P&L\n/quote RELIANCE NSE         # last traded price\n/closeall                   # square off all positions\n/help                       # full command list\n```\n\nEach command runs against the OpenAlgo [Python SDK](../../sdk/python-sdk.md)\nusing the linked user's API key, so results are identical to what you would\nget from the REST API.\n\n## Event-driven order alerts\n\nWhen you place an order via `/api/v1/placeorder` (or any of the other\norder endpoints), the order service publishes an `order.placed` event to\nthe in-process event bus. The WhatsApp subscriber listens on every order\ntopic \u2014 `order.placed`, `order.modified`, `order.cancelled`,\n`orders.all_cancelled`, `position.closed`, `basket.completed`,\n`split.completed`, `options.completed`, `multiorder.completed` \u2014 and\nsends the linked user a formatted alert automatically. No explicit\n`/notify` call needed.\n\nThe Telegram subscriber sits on the same topics, so both channels fire\nin parallel from a single order placement.\n\n## Rate limits\n\nThe `/notify` endpoint and inbound bot commands are throttled independently\nof the global [API rate limits](../rate-limiting.md):\n\n| Endpoint | Limit |\n|----------|-------|\n| `/notify` | 30 / minute |\n| Bot commands (inbound) | 10 / second per linked user |\n\n# Citations\n- Official docs: https://docs.openalgo.in\n- Source: https://github.com/marketcalls/openalgo/blob/main/docs/api/whatsapp-services/README.md", "indicators/hybrid": "# Hybrid Indicators\n\nHybrid indicators combine multiple analytical approaches to provide comprehensive market analysis. These indicators often merge trend, momentum, volatility, and volume components for enhanced signal quality. Data is fetched via the [History API](../api/market-data/history.md) through the [Python SDK](../sdk/python-sdk.md).\n\n### Import Statement\n\n```python\nfrom openalgo import api, ta\n\n# Get data using OpenAlgo API\nclient = api(api_key='your_api_key_here', host='http://127.0.0.1:5000')\ndf = client.history(symbol=\"SBIN\", exchange=\"NSE\", interval=\"5m\", \n                   start_date=\"2025-04-01\", end_date=\"2025-04-08\")\n```\n\n### Available Hybrid Indicators\n\n***\n\n### Average Directional Index (ADX)\n\nADX measures the strength of a trend regardless of direction, providing both directional indicators (+DI, -DI) and trend strength (ADX).\n\n#### Usage\n\n```python\ndi_plus, di_minus, adx = ta.adx(high, low, close, period=14)\n```\n\n#### Parameters\n\n* **high** *(array-like)*: High prices\n* **low** *(array-like)*: Low prices\n* **close** *(array-like)*: Closing prices\n* **period** *(int, default=14)*: Period for ADX calculation\n\n#### Returns\n\n* **tuple**: (+DI, -DI, ADX) arrays in the same format as input\n\n#### Example\n\n```python\n# Calculate ADX system\ndi_plus, di_minus, adx = ta.adx(df['high'], df['low'], df['close'], period=14)\n\ndf['DI_Plus'] = di_plus\ndf['DI_Minus'] = di_minus  \ndf['ADX'] = adx\n\n# Trend analysis\ndf['Trend_Strength'] = df['ADX'].apply(lambda x: 'Strong' if x > 25 else 'Weak' if x > 20 else 'No Trend')\ndf['Trend_Direction'] = df.apply(lambda row: 'Bullish' if row['DI_Plus'] > row['DI_Minus'] \n                                 else 'Bearish' if row['DI_Minus'] > row['DI_Plus'] else 'Neutral', axis=1)\n\nprint(df[['close', 'DI_Plus', 'DI_Minus', 'ADX', 'Trend_Strength', 'Trend_Direction']].tail())\n```\n\n***\n\n### Aroon Indicator\n\nAroon indicators measure the time since the highest high and lowest low, indicating trend strength and potential reversals.\n\n#### Usage\n\n```python\naroon_up, aroon_down = ta.aroon(high, low, period=14)\n```\n\n#### Parameters\n\n* **high** *(array-like)*: High prices\n* **low** *(array-like)*: Low prices\n* **period** *(int, default=14)*: Period for Aroon calculation\n\n#### Returns\n\n* **tuple**: (aroon_up, aroon_down) arrays in the same format as input\n\n#### Example\n\n```python\n# Calculate Aroon indicators\naroon_up, aroon_down = ta.aroon(df['high'], df['low'], period=25)\n\ndf['Aroon_Up'] = aroon_up\ndf['Aroon_Down'] = aroon_down\ndf['Aroon_Oscillator'] = df['Aroon_Up'] - df['Aroon_Down']\n\n# Signal interpretation\ndf['Aroon_Signal'] = df.apply(lambda row: \n    'Strong Uptrend' if row['Aroon_Up'] > 70 and row['Aroon_Down'] < 30\n    else 'Strong Downtrend' if row['Aroon_Down'] > 70 and row['Aroon_Up'] < 30\n    else 'Sideways' if abs(row['Aroon_Up'] - row['Aroon_Down']) < 20\n    else 'Trending', axis=1)\n\nprint(df[['close', 'Aroon_Up', 'Aroon_Down', 'Aroon_Oscillator', 'Aroon_Signal']].tail())\n```\n\n***\n\n### Pivot Points\n\nTraditional pivot points calculate support and resistance levels based on previous period's high, low, and close.\n\n#### Usage\n\n```python\npivot, r1, s1, r2, s2, r3, s3 = ta.pivot_points(high, low, close)\n```\n\n#### Parameters\n\n* **high** *(array-like)*: High prices\n* **low** *(array-like)*: Low prices\n* **close** *(array-like)*: Closing prices\n\n#### Returns\n\n* **tuple**: (pivot, r1, s1, r2, s2, r3, s3) arrays\n\n#### Example\n\n```python\n# Calculate Pivot Points\npivot, r1, s1, r2, s2, r3, s3 = ta.pivot_points(df['high'], df['low'], df['close'])\n\ndf['Pivot'] = pivot\ndf['Resistance_1'] = r1\ndf['Support_1'] = s1\ndf['Resistance_2'] = r2\ndf['Support_2'] = s2\ndf['Resistance_3'] = r3\ndf['Support_3'] = s3\n\n# Identify price position relative to pivot\ndf['Price_Position'] = df.apply(lambda row:\n    'Above R2' if row['close'] > row['Resistance_2']\n    else 'Above R1' if row['close'] > row['Resistance_1']\n    else 'Above Pivot' if row['close'] > row['Pivot']\n    else 'Below Pivot' if row['close'] < row['Support_1']\n    else 'Below S1' if row['close'] < row['Support_2']\n    else 'Below S2' if row['close'] < row['Support_2']\n    else 'Near Pivot', axis=1)\n\nprint(df[['close', 'Pivot', 'Resistance_1', 'Support_1', 'Price_Position']].tail())\n```\n\n***\n\n### Parabolic SAR\n\nParabolic SAR provides trailing stop levels and trend direction signals.\n\n#### Usage\n\n```python\nsar_values, trend_direction = ta.psar(high, low, acceleration=0.02, maximum=0.2)\n```\n\n#### Parameters\n\n* **high** *(array-like)*: High prices\n* **low** *(array-like)*: Low prices\n* **acceleration** *(float, default=0.02)*: Acceleration factor\n* **maximum** *(float, default=0.2)*: Maximum acceleration factor\n\n#### Returns\n\n* **tuple**: (sar_values, trend_direction) arrays\n\n#### Example\n\n```python\n# Calculate Parabolic SAR\nsar_values, trend_direction = ta.psar(df['high'], df['low'])\n\ndf['SAR'] = sar_values\ndf['SAR_Trend'] = trend_direction\n\n# Generate trading signals\ndf['SAR_Signal'] = df.apply(lambda row:\n    'Buy' if row['close'] > row['SAR'] and row['SAR_Trend'] == -1  # Uptrend\n    else 'Sell' if row['close'] < row['SAR'] and row['SAR_Trend'] == 1  # Downtrend\n    else 'Hold', axis=1)\n\n# Calculate distance from SAR (risk management)\ndf['SAR_Distance'] = abs(df['close'] - df['SAR'])\ndf['SAR_Distance_Pct'] = (df['SAR_Distance'] / df['close']) * 100\n\nprint(df[['close', 'SAR', 'SAR_Signal', 'SAR_Distance_Pct']].tail())\n```\n\n***\n\n### Directional Movement Index (DMI)\n\nDMI focuses on the directional indicators (+DI and -DI) without the ADX component.\n\n#### Usage\n\n```python\ndi_plus, di_minus = ta.dmi(high, low, close, period=14)\n```\n\n#### Parameters\n\n* **high** *(array-like)*: High prices\n* **low** *(array-like)*: Low prices\n* **close** *(array-like)*: Closing prices\n* **period** *(int, default=14)*: Period for DMI calculation\n\n#### Returns\n\n* **tuple**: (+DI, -DI) arrays in the same format as input\n\n#### Example\n\n```python\n# Calculate DMI\ndi_plus, di_minus = ta.dmi(df['high'], df['low'], df['close'])\n\ndf['DI_Plus'] = di_plus\ndf['DI_Minus'] = di_minus\ndf['DI_Spread'] = df['DI_Plus'] - df['DI_Minus']\n\n# Generate directional signals\ndf['DMI_Signal'] = df.apply(lambda row:\n    'Strong Buy' if row['DI_Plus'] > row['DI_Minus'] and row['DI_Spread'] > 10\n    else 'Buy' if row['DI_Plus'] > row['DI_Minus']\n    else 'Strong Sell' if row['DI_Minus'] > row['DI_Plus'] and row['DI_Spread'] < -10\n    else 'Sell' if row['DI_Minus'] > row['DI_Plus']\n    else 'Neutral', axis=1)\n\nprint(df[['close', 'DI_Plus', 'DI_Minus', 'DI_Spread', 'DMI_Signal']].tail())\n```\n\n***\n\n### Williams Fractals\n\nWilliams Fractals identify turning points (fractals) in price action using local highs and lows.\n\n#### Usage\n\n```python\nfractal_up, fractal_down = ta.fractals(high, low, periods=2)\n```\n\n#### Parameters\n\n* **high** *(array-like)*: High prices\n* **low** *(array-like)*: Low prices\n* **periods** *(int, default=2)*: Number of periods to check (minimum 2)\n\n#### Returns\n\n* **tuple**: (fractal_up, fractal_down) boolean arrays indicating fractal points\n\n#### Example\n\n```python\n# Calculate Williams Fractals\nfractal_up, fractal_down = ta.fractals(df['high'], df['low'], periods=2)\n\ndf['Fractal_Up'] = fractal_up\ndf['Fractal_Down'] = fractal_down\n\n# Mark fractal levels\ndf['Fractal_High'] = df['high'].where(df['Fractal_Up'])\ndf['Fractal_Low'] = df['low'].where(df['Fractal_Down'])\n\n# Count recent fractals for market structure analysis\nwindow = 20\ndf['Recent_Fractal_Highs'] = df['Fractal_Up'].rolling(window).sum()\ndf['Recent_Fractal_Lows'] = df['Fractal_Down'].rolling(window).sum()\n\ndf['Market_Structure'] = df.apply(lambda row:\n    'Bullish Structure' if row['Recent_Fractal_Lows'] > row['Recent_Fractal_Highs']\n    else 'Bearish Structure' if row['Recent_Fractal_Highs'] > row['Recent_Fractal_Lows']\n    else 'Balanced', axis=1)\n\nprint(df[['close', 'Fractal_High', 'Fractal_Low', 'Market_Structure']].dropna().tail())\n```\n\n***\n\n### Random Walk Index (RWI)\n\nRWI measures how much a security's price movement differs from a random walk, helping identify trending vs. random price movements.\n\n#### Usage\n\n```python\nrwi_high, rwi_low = ta.rwi(high, low, close, period=14)\n```\n\n#### Parameters\n\n* **high** *(array-like)*: High prices\n* **low** *(array-like)*: Low prices\n* **close** *(array-like)*: Closing prices\n* **period** *(int, default=14)*: Period for RWI calculation\n\n#### Returns\n\n* **tuple**: (rwi_high, rwi_low) arrays in the same format as input\n\n#### Example\n\n```python\n# Calculate Random Walk Index\nrwi_high, rwi_low = ta.rwi(df['high'], df['low'], df['close'], period=14)\n\ndf['RWI_High'] = rwi_high\ndf['RWI_Low'] = rwi_low\ndf['RWI_Max'] = df[['RWI_High', 'RWI_Low']].max(axis=1)\n\n# Interpret RWI signals\ndf['RWI_Signal'] = df.apply(lambda row:\n    'Strong Uptrend' if row['RWI_High'] > 1.0 and row['RWI_High'] > row['RWI_Low']\n    else 'Strong Downtrend' if row['RWI_Low'] > 1.0 and row['RWI_Low'] > row['RWI_High']\n    else 'Weak Uptrend' if row['RWI_High'] > row['RWI_Low'] and row['RWI_High'] > 0.6\n    else 'Weak Downtrend' if row['RWI_Low'] > row['RWI_High'] and row['RWI_Low'] > 0.6\n    else 'Random Walk', axis=1)\n\n# Calculate trend strength\ndf['Trend_Strength_RWI'] = df['RWI_Max'].apply(lambda x:\n    'Very Strong' if x > 1.5\n    else 'Strong' if x > 1.0\n    else 'Moderate' if x > 0.6\n    else 'Weak')\n\nprint(df[['close', 'RWI_High', 'RWI_Low', 'RWI_Signal', 'Trend_Strength_RWI']].tail())\n```\n\n***\n\n### Complete Example: Comprehensive Trend Analysis\n\n```python\nimport pandas as pd\nfrom openalgo import api, ta\n\n# Get market data\nclient = api(api_key='your_api_key_here', host='http://127.0.0.1:5000')\ndf = client.history(symbol=\"SBIN\", exchange=\"NSE\", interval=\"5m\", \n                   start_date=\"2025-04-01\", end_date=\"2025-04-08\")\n\n# Calculate multiple hybrid indicators\nprint(\"Calculating hybrid indicators...\")\n\n# ADX System\ndi_plus, di_minus, adx = ta.adx(df['high'], df['low'], df['close'])\ndf['DI_Plus'] = di_plus\ndf['DI_Minus'] = di_minus\ndf['ADX'] = adx\n\n# Aroon System\naroon_up, aroon_down = ta.aroon(df['high'], df['low'])\ndf['Aroon_Up'] = aroon_up\ndf['Aroon_Down'] = aroon_down\ndf['Aroon_Osc'] = df['Aroon_Up'] - df['Aroon_Down']\n\n# Parabolic SAR\nsar_values, sar_trend = ta.psar(df['high'], df['low'])\ndf['SAR'] = sar_values\ndf['SAR_Trend'] = sar_trend\n\n# Random Walk Index\nrwi_high, rwi_low = ta.rwi(df['high'], df['low'], df['close'])\ndf['RWI_High'] = rwi_high\ndf['RWI_Low'] = rwi_low\n\n# Williams Fractals\nfractal_up, fractal_down = ta.fractals(df['high'], df['low'])\ndf['Fractal_Up'] = fractal_up\ndf['Fractal_Down'] = fractal_down\n\n# Create comprehensive trend signal\ndef comprehensive_trend_signal(row):\n    signals = []\n    \n    # ADX Signal\n    if row['ADX'] > 25:\n        if row['DI_Plus'] > row['DI_Minus']:\n            signals.append('ADX_Bull')\n        else:\n            signals.append('ADX_Bear')\n    \n    # Aroon Signal\n    if row['Aroon_Up'] > 70:\n        signals.append('Aroon_Bull')\n    elif row['Aroon_Down'] > 70:\n        signals.append('Aroon_Bear')\n    \n    # SAR Signal\n    if row['close'] > row['SAR']:\n        signals.append('SAR_Bull')\n    else:\n        signals.append('SAR_Bear')\n    \n    # RWI Signal\n    if row['RWI_High'] > 1.0 and row['RWI_High'] > row['RWI_Low']:\n        signals.append('RWI_Bull')\n    elif row['RWI_Low'] > 1.0 and row['RWI_Low'] > row['RWI_High']:\n        signals.append('RWI_Bear')\n    \n    # Count bullish vs bearish signals\n    bull_count = len([s for s in signals if 'Bull' in s])\n    bear_count = len([s for s in signals if 'Bear' in s])\n    \n    if bull_count > bear_count and bull_count >= 2:\n        return f'Bullish ({bull_count}/{len(signals)})'\n    elif bear_count > bull_count and bear_count >= 2:\n        return f'Bearish ({bear_count}/{len(signals)})'\n    else:\n        return f'Neutral ({bull_count}B/{bear_count}B)'\n\ndf['Comprehensive_Signal'] = df.apply(comprehensive_trend_signal, axis=1)\n\n# Calculate signal strength\ndf['Signal_Strength'] = df.apply(lambda row:\n    row['ADX'] * 0.3 + abs(row['Aroon_Osc']) * 0.3 + \n    max(row['RWI_High'], row['RWI_Low']) * 40, axis=1)\n\n# Display results\nresult_columns = ['close', 'ADX', 'Aroon_Osc', 'SAR', 'RWI_High', 'RWI_Low', \n                 'Comprehensive_Signal', 'Signal_Strength']\n\nprint(\"\\nComprehensive Trend Analysis:\")\nprint(df[result_columns].tail(10))\n\n# Summary statistics\nprint(f\"\\nSignal Distribution:\")\nprint(df['Comprehensive_Signal'].value_counts())\n\nprint(f\"\\nAverage Signal Strength: {df['Signal_Strength'].mean():.2f}\")\nprint(f\"Current Signal Strength: {df['Signal_Strength'].iloc[-1]:.2f}\")\n```\n\n### Advanced Usage: Multi-Timeframe Analysis\n\n```python\n# Function to get multiple timeframe data\ndef get_multi_timeframe_data(symbol, exchange, start_date, end_date):\n    timeframes = ['1m', '5m', '15m', '1h']\n    data = {}\n    \n    for tf in timeframes:\n        try:\n            df = client.history(symbol=symbol, exchange=exchange, interval=tf,\n                              start_date=start_date, end_date=end_date)\n            data[tf] = df\n        except Exception as e:\n            print(f\"Error fetching {tf} data: {e}\")\n    \n    return data\n\n# Multi-timeframe trend analysis\ndef analyze_multi_timeframe_trend(data_dict):\n    results = {}\n    \n    for timeframe, df in data_dict.items():\n        # Calculate key hybrid indicators\n        di_plus, di_minus, adx = ta.adx(df['high'], df['low'], df['close'])\n        aroon_up, aroon_down = ta.aroon(df['high'], df['low'])\n        \n        latest_adx = adx.iloc[-1] if not pd.isna(adx.iloc[-1]) else 0\n        latest_di_plus = di_plus.iloc[-1] if not pd.isna(di_plus.iloc[-1]) else 0\n        latest_di_minus = di_minus.iloc[-1] if not pd.isna(di_minus.iloc[-1]) else 0\n        latest_aroon_up = aroon_up.iloc[-1] if not pd.isna(aroon_up.iloc[-1]) else 0\n        latest_aroon_down = aroon_down.iloc[-1] if not pd.isna(aroon_down.iloc[-1]) else 0\n        \n        # Determine trend\n        if latest_adx > 25:\n            if latest_di_plus > latest_di_minus:\n                trend = 'Bullish'\n            else:\n                trend = 'Bearish'\n        else:\n            trend = 'Sideways'\n        \n        results[timeframe] = {\n            'Trend': trend,\n            'ADX': latest_adx,\n            'Aroon_Strength': abs(latest_aroon_up - latest_aroon_down)\n        }\n    \n    return results\n\n# Example usage\n# mtf_data = get_multi_timeframe_data(\"SBIN\", \"NSE\", \"2025-04-01\", \"2025-04-08\")\n# mtf_analysis = analyze_multi_timeframe_trend(mtf_data)\n# print(\"Multi-Timeframe Analysis:\", mtf_analysis)\n```\n\n### Performance Tips\n\n1. **Vectorized Operations**: Use pandas operations for better performance with large datasets\n2. **Memory Optimization**: Calculate only needed indicators to reduce memory usage\n3. **Caching**: Store intermediate calculations for reuse across multiple indicators\n4. **Batch Processing**: Process multiple symbols together when possible\n\n### Common Use Cases\n\n1. **Trend Confirmation**: Use ADX with Aroon for trend strength validation\n2. **Entry Timing**: Combine SAR with DMI for precise entry points\n3. **Support/Resistance**: Use Pivot Points with Fractals for key levels\n4. **Risk Management**: Use RWI to distinguish trending from random movements\n5. **Multi-Timeframe**: Align signals across different timeframes for higher probability trades\n\n## Related\n\n- [Trend Indicators](trend.md)\n- [Momentum Indicators](momentum.md)\n- [Statistical Indicators](statistical.md)\n- [Utility Functions](utility.md)\n- [Technical Indicators Introduction](introduction.md)\n\n# Citations\n- Official docs: https://docs.openalgo.in\n- Source: https://github.com/marketcalls/openalgo/blob/main/docs/prompt/indicators/hybrid%20-%20openalgo%20indicators.md", "indicators/introduction": "# Technical Indicators Introduction\n\n## OpenAlgo Technical Indicators Library\n\nOpenAlgo Technical Indicators is a high-performance Python library designed for comprehensive technical analysis with a focus on speed, accuracy, and ease of use. Built from the ground up with modern optimization techniques, it provides over 80 technical indicators across all major categories.\n\nIndicators are computed on OHLCV data. In a typical workflow you fetch historical candles via the [Python SDK](../sdk/python-sdk.md) (or the [History API](../api/market-data/history.md)) into a pandas DataFrame, then pass the price/volume series into the `ta` functions. See the bundle [Overview](../overview.md) for how indicators fit into the broader OpenAlgo platform.\n\n### Import Statement\n\n```python\nfrom openalgo import ta\n```\n\n### List of Supported Indicators\n\n### [Trend Indicators](trend.md)\n\n* **SMA** - Simple Moving Average\n* **EMA** - Exponential Moving Average\n* **WMA** - Weighted Moving Average\n* **DEMA** - Double Exponential Moving Average\n* **TEMA** - Triple Exponential Moving Average\n* **HMA** - Hull Moving Average\n* **VWMA** - Volume Weighted Moving Average\n* **ALMA** - Arnaud Legoux Moving Average\n* **KAMA** - Kaufman's Adaptive Moving Average\n* **ZLEMA** - Zero Lag Exponential Moving Average\n* **T3** - T3 Moving Average\n* **FRAMA** - Fractal Adaptive Moving Average\n* **TRIMA** - Triangular Moving Average\n* **McGinley** - McGinley Dynamic\n* **VIDYA** - Variable Index Dynamic Average\n* **Alligator** - Bill Williams Alligator\n* **MovingAverageEnvelopes** - Moving Average Envelopes\n* **Supertrend** - Supertrend Indicator\n* **Ichimoku** - Ichimoku Cloud\n* **ChandeKrollStop** - Chande Kroll Stop\n\n### [Momentum Indicators](momentum.md)\n\n* **RSI** - Relative Strength Index\n* **MACD** - Moving Average Convergence Divergence\n* **Stochastic** - Stochastic Oscillator\n* **CCI** - Commodity Channel Index\n* **WilliamsR** - Williams %R\n* **BOP** - Balance of Power\n* **ElderRay** - Elder Ray Index (Bull/Bear Power)\n* **Fisher** - Fisher Transform\n* **CRSI** - Connors RSI\n\n### [Volatility Indicators](volatility.md)\n\n* **ATR** - Average True Range\n* **BollingerBands** - Bollinger Bands\n* **Keltner** - Keltner Channel\n* **Donchian** - Donchian Channel\n* **Chaikin** - Chaikin Volatility\n* **NATR** - Normalized Average True Range\n* **RVI** - Relative Volatility Index (volatility version)\n* **ULTOSC** - Ultimate Oscillator\n* **TRANGE** - True Range\n* **MASS** - Mass Index\n* **BBPercent** - Bollinger Bands %B\n* **BBWidth** - Bollinger Bandwidth\n* **ChandelierExit** - Chandelier Exit\n* **HistoricalVolatility** - Historical Volatility\n* **UlcerIndex** - Ulcer Index\n* **STARC** - STARC Bands\n\n### [Volume Indicators](volume.md)\n\n* **OBV** - On Balance Volume\n* **OBVSmoothed** - On Balance Volume with Smoothing\n* **VWAP** - Volume Weighted Average Price\n* **MFI** - Money Flow Index\n* **ADL** - Accumulation/Distribution Line\n* **CMF** - Chaikin Money Flow\n* **EMV** - Ease of Movement\n* **FI** - Elder Force Index\n* **NVI** - Negative Volume Index\n* **PVI** - Positive Volume Index\n* **VOLOSC** - Volume Oscillator\n* **VROC** - Volume Rate of Change\n* **KlingerVolumeOscillator** - Klinger Volume Oscillator\n* **PriceVolumeTrend** - Price Volume Trend\n* **RVOL** - Relative Volume\n\n### Oscillators\n\n* **ROC** - Rate of Change\n* **CMO** - Chande Momentum Oscillator\n* **TRIX** - Triple Exponential Average\n* **UO** - Ultimate Oscillator\n* **AO** - Awesome Oscillator\n* **AC** - Accelerator Oscillator\n* **PPO** - Percentage Price Oscillator\n* **PO** - Price Oscillator\n* **DPO** - Detrended Price Oscillator\n* **AROONOSC** - Aroon Oscillator\n* **StochRSI** - Stochastic RSI\n* **RVI** - Relative Vigor Index (oscillator version)\n* **CHO** - Chaikin Oscillator\n* **CHOP** - Choppiness Index\n* **KST** - Know Sure Thing\n* **TSI** - True Strength Index\n* **VI** - Vortex Indicator\n* **STC** - Schaff Trend Cycle\n* **GatorOscillator** - Gator Oscillator\n* **Coppock** - Coppock Curve\n\n### [Statistical Indicators](statistical.md)\n\n* **LINREG** - Linear Regression\n* **LRSLOPE** - Linear Regression Slope\n* **CORREL** - Pearson Correlation Coefficient\n* **BETA** - Beta Coefficient\n* **VAR** - Variance\n* **TSF** - Time Series Forecast\n* **MEDIAN** - Rolling Median\n* **MedianBands** - Median with Bands\n* **MODE** - Rolling Mode\n\n### [Hybrid Indicators](hybrid.md)\n\n* **ADX** - Average Directional Index\n* **Aroon** - Aroon Indicator\n* **PivotPoints** - Pivot Points\n* **SAR** - Parabolic SAR\n* **DMI** - Directional Movement Index\n* **WilliamsFractals** - Williams Fractals\n* **RWI** - Random Walk Index\n\n### [Utility Functions](utility.md)\n\n* **crossover** - Series crossover detection\n* **crossunder** - Series crossunder detection\n* **highest** - Highest value over period\n* **lowest** - Lowest value over period\n* **change** - Change in value\n* **roc** - Rate of change\n* **stdev** - Standard deviation\n* **exrem** - Excess removal\n* **flip** - Flip function\n* **valuewhen** - Value when condition\n* **rising** - Rising detection\n* **falling** - Falling detection\n* **cross** - Cross detection (both directions)\n\n### Perfect For\n\n* **Quantitative Analysts** building trading strategies\n* **Financial Engineers** developing risk management systems\n* **Algorithmic Traders** requiring fast, reliable technical analysis\n* **Research Teams** conducting market analysis and backtesting\n* **Financial Applications** needing embedded technical analysis capabilities\n\nOpenAlgo Indicators bridges the gap between ease of use and performance, making sophisticated technical analysis accessible to both beginners and experts while maintaining the speed and accuracy demanded by professional trading systems.\n\n# Citations\n- Official docs: https://docs.openalgo.in\n- Source: https://github.com/marketcalls/openalgo/blob/main/docs/prompt/indicators/openalgo%20indicators%20-%20introduction.md", "indicators/momentum": "# Momentum Indicators\n\nMomentum indicators measure the speed and strength of price movements, helping identify overbought/oversold conditions and potential trend reversals. All examples operate on OHLCV data fetched via the [History API](../api/market-data/history.md) through the [Python SDK](../sdk/python-sdk.md).\n\n### Import Statement\n\n```python\nfrom openalgo import ta\n```\n\n### Available Momentum Indicators\n\n***\n\n### Relative Strength Index (RSI)\n\nRSI is a momentum oscillator that measures the speed and magnitude of price changes, oscillating between 0 and 100.\n\n#### Usage\n\n```python\nrsi_result = ta.rsi(data, period=14)\n```\n\n#### Parameters\n\n* **data** *(array-like)*: Price data (typically closing prices)\n* **period** *(int, default=14)*: Number of periods for RSI calculation\n\n#### Returns\n\n* **array**: RSI values (range: 0 to 100) in the same format as input\n\n#### Example\n\n```python\nfrom openalgo import api, ta\n\n# Get market data\nclient = api(api_key='your_api_key_here', host='http://127.0.0.1:5000')\ndf = client.history(symbol=\"SBIN\", exchange=\"NSE\", interval=\"5m\", \n                   start_date=\"2025-04-01\", end_date=\"2025-04-08\")\n\n# Calculate RSI\ndf['RSI_14'] = ta.rsi(df['close'], 14)\ndf['RSI_21'] = ta.rsi(df['close'], 21)\n\nprint(df[['close', 'RSI_14', 'RSI_21']].tail())\n```\n\n***\n\n### Moving Average Convergence Divergence (MACD)\n\nMACD is a trend-following momentum indicator showing the relationship between two exponential moving averages.\n\n#### Usage\n\n```python\nmacd_line, signal_line, histogram = ta.macd(data, fast_period=12, slow_period=26, signal_period=9)\n```\n\n#### Parameters\n\n* **data** *(array-like)*: Price data (typically closing prices)\n* **fast_period** *(int, default=12)*: Period for fast EMA\n* **slow_period** *(int, default=26)*: Period for slow EMA\n* **signal_period** *(int, default=9)*: Period for signal line EMA\n\n#### Returns\n\n* **tuple**: (macd_line, signal_line, histogram) arrays\n\n#### Example\n\n```python\n# Calculate MACD\nmacd_line, signal_line, histogram = ta.macd(df['close'])\n\n# Add to DataFrame\ndf['MACD'] = macd_line\ndf['MACD_Signal'] = signal_line\ndf['MACD_Histogram'] = histogram\n\n# Custom parameters\nmacd_fast, signal_fast, hist_fast = ta.macd(df['close'], fast_period=8, slow_period=21, signal_period=5)\n\nprint(df[['close', 'MACD', 'MACD_Signal', 'MACD_Histogram']].tail())\n```\n\n***\n\n### Stochastic Oscillator\n\nThe Stochastic Oscillator compares a security's closing price to its price range over a given time period.\n\n#### Usage\n\n```python\nk_percent, d_percent = ta.stochastic(high, low, close, k_period=14, d_period=3)\n```\n\n#### Parameters\n\n* **high** *(array-like)*: High prices\n* **low** *(array-like)*: Low prices\n* **close** *(array-like)*: Closing prices\n* **k_period** *(int, default=14)*: Period for %K calculation\n* **d_period** *(int, default=3)*: Period for %D calculation (SMA of %K)\n\n#### Returns\n\n* **tuple**: (k_percent, d_percent) arrays\n\n#### Example\n\n```python\n# Calculate Stochastic Oscillator\nstoch_k, stoch_d = ta.stochastic(df['high'], df['low'], df['close'])\n\n# Add to DataFrame\ndf['Stoch_K'] = stoch_k\ndf['Stoch_D'] = stoch_d\n\n# Custom parameters\nstoch_k_fast, stoch_d_fast = ta.stochastic(df['high'], df['low'], df['close'], \n                                          k_period=5, d_period=3)\n\nprint(df[['close', 'Stoch_K', 'Stoch_D']].tail())\n```\n\n***\n\n### Commodity Channel Index (CCI)\n\nCCI measures the current price level relative to an average price level over a given period.\n\n#### Usage\n\n```python\ncci_result = ta.cci(high, low, close, period=20)\n```\n\n#### Parameters\n\n* **high** *(array-like)*: High prices\n* **low** *(array-like)*: Low prices\n* **close** *(array-like)*: Closing prices\n* **period** *(int, default=20)*: Number of periods for CCI calculation\n\n#### Returns\n\n* **array**: CCI values in the same format as input\n\n#### Example\n\n```python\n# Calculate CCI\ndf['CCI_20'] = ta.cci(df['high'], df['low'], df['close'], 20)\ndf['CCI_14'] = ta.cci(df['high'], df['low'], df['close'], 14)\n\nprint(df[['close', 'CCI_20', 'CCI_14']].tail())\n```\n\n***\n\n### Williams %R\n\nWilliams %R is a momentum indicator that measures overbought and oversold levels on a scale from 0 to -100.\n\n#### Usage\n\n```python\nwilliams_r = ta.williams_r(high, low, close, period=14)\n```\n\n#### Parameters\n\n* **high** *(array-like)*: High prices\n* **low** *(array-like)*: Low prices\n* **close** *(array-like)*: Closing prices\n* **period** *(int, default=14)*: Number of periods for Williams %R calculation\n\n#### Returns\n\n* **array**: Williams %R values (range: 0 to -100) in the same format as input\n\n#### Example\n\n```python\n# Calculate Williams %R\ndf['Williams_R'] = ta.williams_r(df['high'], df['low'], df['close'])\ndf['Williams_R_21'] = ta.williams_r(df['high'], df['low'], df['close'], 21)\n\nprint(df[['close', 'Williams_R', 'Williams_R_21']].tail())\n```\n\n***\n\n### Balance of Power (BOP)\n\nBalance of Power measures the strength of buyers versus sellers by assessing the ability of each side to drive prices to an extreme level.\n\n#### Usage\n\n```python\nbop_result = ta.bop(open_prices, high, low, close)\n```\n\n#### Parameters\n\n* **open_prices** *(array-like)*: Opening prices\n* **high** *(array-like)*: High prices\n* **low** *(array-like)*: Low prices\n* **close** *(array-like)*: Closing prices\n\n#### Returns\n\n* **array**: BOP values in the same format as input\n\n#### Example\n\n```python\n# Calculate Balance of Power\ndf['BOP'] = ta.bop(df['open'], df['high'], df['low'], df['close'])\n\nprint(df[['close', 'BOP']].tail())\n```\n\n***\n\n### Elder Ray Index\n\nElder Ray Index consists of Bull Power and Bear Power, measuring the ability of bulls and bears to drive prices above or below an EMA.\n\n#### Usage\n\n```python\nbull_power, bear_power = ta.elderray(high, low, close, period=13)\n```\n\n#### Parameters\n\n* **high** *(array-like)*: High prices\n* **low** *(array-like)*: Low prices\n* **close** *(array-like)*: Closing prices\n* **period** *(int, default=13)*: Period for EMA calculation\n\n#### Returns\n\n* **tuple**: (bull_power, bear_power) arrays\n\n#### Example\n\n```python\n# Calculate Elder Ray Index\nbull_power, bear_power = ta.elderray(df['high'], df['low'], df['close'])\n\n# Add to DataFrame\ndf['Bull_Power'] = bull_power\ndf['Bear_Power'] = bear_power\n\nprint(df[['close', 'Bull_Power', 'Bear_Power']].tail())\n```\n\n***\n\n### Fisher Transform\n\nThe Fisher Transform converts prices into a Gaussian normal distribution, making it easier to identify turning points.\n\n#### Usage\n\n```python\nfisher, trigger = ta.fisher(high, low, length=9)\n```\n\n#### Parameters\n\n* **high** *(array-like)*: High prices\n* **low** *(array-like)*: Low prices\n* **length** *(int, default=9)*: Length for highest/lowest calculation\n\n#### Returns\n\n* **tuple**: (fisher, trigger) arrays\n\n#### Example\n\n```python\n# Calculate Fisher Transform\nfisher, fisher_trigger = ta.fisher(df['high'], df['low'])\n\n# Add to DataFrame\ndf['Fisher'] = fisher\ndf['Fisher_Trigger'] = fisher_trigger\n\n# Custom length\nfisher_14, trigger_14 = ta.fisher(df['high'], df['low'], length=14)\n\nprint(df[['close', 'Fisher', 'Fisher_Trigger']].tail())\n```\n\n***\n\n### Connors RSI (CRSI)\n\nConnors RSI is a composite momentum oscillator consisting of three components: RSI of price, RSI of updown streak, and percent rank of 1-period ROC.\n\n#### Usage\n\n```python\ncrsi_result = ta.crsi(data, lenrsi=3, lenupdown=2, lenroc=100)\n```\n\n#### Parameters\n\n* **data** *(array-like)*: Price data (typically closing prices)\n* **lenrsi** *(int, default=3)*: RSI Length (period for price RSI)\n* **lenupdown** *(int, default=2)*: UpDown Length (period for streak RSI)\n* **lenroc** *(int, default=100)*: ROC Length (period for ROC percent rank)\n\n#### Returns\n\n* **array**: Connors RSI values in the same format as input\n\n#### Example\n\n```python\n# Calculate Connors RSI\ndf['CRSI'] = ta.crsi(df['close'])\n\n# Custom parameters\ndf['CRSI_Custom'] = ta.crsi(df['close'], lenrsi=5, lenupdown=3, lenroc=50)\n\nprint(df[['close', 'CRSI', 'CRSI_Custom']].tail())\n```\n\n***\n\n### Complete Example: Multiple Momentum Indicators\n\n```python\nfrom openalgo import api, ta\nimport pandas as pd\n\n# Get market data\nclient = api(api_key='your_api_key_here', host='http://127.0.0.1:5000')\ndf = client.history(symbol=\"SBIN\", exchange=\"NSE\", interval=\"5m\", \n                   start_date=\"2025-04-01\", end_date=\"2025-04-08\")\n\n# Calculate momentum indicators\ndf['RSI'] = ta.rsi(df['close'], 14)\n\n# MACD\nmacd_line, signal_line, histogram = ta.macd(df['close'])\ndf['MACD'] = macd_line\ndf['MACD_Signal'] = signal_line\ndf['MACD_Histogram'] = histogram\n\n# Stochastic\nstoch_k, stoch_d = ta.stochastic(df['high'], df['low'], df['close'])\ndf['Stoch_K'] = stoch_k\ndf['Stoch_D'] = stoch_d\n\n# CCI\ndf['CCI'] = ta.cci(df['high'], df['low'], df['close'], 20)\n\n# Williams %R\ndf['Williams_R'] = ta.williams_r(df['high'], df['low'], df['close'])\n\n# Balance of Power\ndf['BOP'] = ta.bop(df['open'], df['high'], df['low'], df['close'])\n\n# Elder Ray\nbull_power, bear_power = ta.elderray(df['high'], df['low'], df['close'])\ndf['Bull_Power'] = bull_power\ndf['Bear_Power'] = bear_power\n\n# Fisher Transform\nfisher, fisher_trigger = ta.fisher(df['high'], df['low'])\ndf['Fisher'] = fisher\ndf['Fisher_Trigger'] = fisher_trigger\n\n# Connors RSI\ndf['CRSI'] = ta.crsi(df['close'])\n\n# Display results\nmomentum_cols = ['close', 'RSI', 'MACD', 'MACD_Signal', 'Stoch_K', 'Stoch_D', \n                'CCI', 'Williams_R', 'BOP', 'Bull_Power', 'Bear_Power', \n                'Fisher', 'CRSI']\n\nprint(df[momentum_cols].tail(10))\n\n# Trading signals example\ndf['RSI_Oversold'] = df['RSI'] < 30\ndf['RSI_Overbought'] = df['RSI'] > 70\ndf['MACD_Bullish'] = df['MACD'] > df['MACD_Signal']\ndf['Stoch_Oversold'] = (df['Stoch_K'] < 20) & (df['Stoch_D'] < 20)\n\n# Combine signals\ndf['Bullish_Signal'] = (df['RSI_Oversold']) & (df['MACD_Bullish']) & (df['Stoch_Oversold'])\n\nprint(\"\\nBullish signals:\")\nprint(df[df['Bullish_Signal']][['close', 'RSI', 'MACD', 'Stoch_K']].head())\n```\n\n### Signal Interpretation Guide\n\n#### RSI\n\n* **> 70**: Overbought (potential sell signal)\n* **< 30**: Oversold (potential buy signal)\n* **50**: Neutral momentum\n\n#### MACD\n\n* **MACD > Signal**: Bullish momentum\n* **MACD < Signal**: Bearish momentum\n* **Histogram > 0**: Increasing bullish momentum\n* **Histogram < 0**: Increasing bearish momentum\n\n#### Stochastic\n\n* **%K > 80**: Overbought conditions\n* **%K < 20**: Oversold conditions\n* **%K crossing above %D**: Bullish signal\n* **%K crossing below %D**: Bearish signal\n\n#### CCI\n\n* **> +100**: Strong uptrend\n* **< -100**: Strong downtrend\n* **-100 to +100**: Ranging market\n\n#### Williams %R\n\n* **> -20**: Overbought\n* **< -80**: Oversold\n* **Crossing -50**:
